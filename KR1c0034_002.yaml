body:
  text: 詩解頤卷二明朱善撰小雅二鹿鳴首章君之燕臣其事非一有因祭而燕者有因朝而燕者有因聘而燕者有因錫有功而燕者其事不同則所以相告語者亦異如其君之尚武歟則告之以矢其文德洽此四國可也如其君之尚文歟則告之以詰爾戎兵陟禹之迹可也如欲其君之敬天歟則告之以陟降厥士日監在兹可也如欲其君之修身歟則告之以敬慎威儀維民之則亦可也為其有兄弟也而申之以常棣之思為其有朋友也而申之以伐木之義衮職由是而可補民情由是而可達先王之典章由是而可修先民之話言由是而可聞莫不因事以有言因言以致戒而所謂大道者在是矣夫豈泛然為不切之論而已哉抑古人之燕必至於旅而後語何也蓋由旅而上其揖遜升降之節繁矣其酌獻酬酢之文縟矣嘉賔之至於斯也其容止之淑慎威儀之審密固自足以起人之敬畏而斯人之所得於觀感者深矣逮夫幣帛之既將琴瑟之既奏則主人之誠意已至矣乃至於旅而後君可以有求臣可以有言蓋君之求臣也必在於禮樂既備之後臣之答君也亦在於禮樂既成之餘則上之所以求之者固從容而不迫下所以答之者亦誠一而無偽此古之君臣所以為不可及歟二章藴於中而有是德則發於外而有是聲譽其聲譽之孔昭非勉強而致之也乃其自然之形著也自斯民言之則示之以重厚而澆薄之俗革示之以忠信而詐偽之習變是德孚於下而下有所法也自君子言之則觀感之深而有以鎮其躁儀刑之久而有以消其邪是德孚於上而上有所法也斯人也其可使人一日而不在朝乎是以我有旨酒則願共於此乎燕飲於此乎遊遨也四壯忠孝非二道忠於君者必其能養於親也然忠孝不兩立致其勞於外則必闕其養於內又不可以不慮也為人臣者將欲致其力於私養歟則當官而行國事固不可以不恤將欲致其力於王事歟則子職之不共又何以為孝哉此王者之勞使臣所以必探其情而代之言為人臣者聞之亦必有以自慰而益不懈於用力矣皇皇者華每懷靡及其義甚廣每懷者每事而思之謂之靡及則其心歉然常若有所不及也然不曰使臣而曰征夫則不特使臣此心其屬亦此心也推此心也以在外則耆老之在所當問遺逸之在所當求鰥寡之在所當恤廢墜之在所當舉上德之厚也而欲其無一之不宣下情之逺也而欲其無一之不達為使臣者固惟恐無以副君之意而為其屬者又惟恐無以為使臣之助庶可以稱斯職矣於遣使之時而歌此固所以勸勉之也常棣自三章至五章皆舉朋友以明兄弟之當親自六章至八章復舉妻子以明兄弟之當厚朋友之不如兄弟也朋友以義合而兄弟以天屬也妻子之不如兄弟也妻吾之所配子吾之所出而兄弟則吾之同氣也薄於兄弟而厚於朋友者不知親踈之殺者也薄於兄弟而厚於妻子者不知尊卑之等者也故必厚於兄弟而後朋友之好愈篤尤必厚於兄弟而後妻孥之樂可久苟兄弟鬬鬩於內則不惟朋友不得以盡其情而妻孥且不得以久其樂矣噫世之人乃有視兄弟如路人甚則視之如冦讎者亦獨何心哉伐木伐木以燕朋友而篇中有諸父諸舅兄弟之辭何也曰人之所資於朋友者以明道也以進德也道之所存德之所存吾斯友之矣而何常之有哉是故無貴無賤無尊無平無親無踈皆可得而友貴之而為天子賤之而為庶人尊之而為父兄卑之而為子弟親之而為同姓踈之而為異姓其分雖不同而其可友則如一故以賤交貴而不為諂以貴交賤而不為屈以卑就尊而不為僭以尊就卑而不為貶內取之同姓而不為昵外取之異姓而不為泛道之所存德之所存即吾友之所存也而何貴賤親踈之間哉必知此道也而後可以言友矣天保首章言天將安定我君則必有以廣其受福之量使爾之盡厚則福之來也如百川之赴海其來者無窮而其消而去之也亦無窮使爾之多益則福之來也又無一之不備身之康強子孫之逢吉室家之和平朝廷之清明黎民之質實無偽皆所謂福也而無不有以受之以其有是量也苟其量之不廣且厚則如無源之水朝滿夕除豈能以盛大悠久哉月之恆每月而一盈者也日之升每旦而一明者也南山之壽終古而不忒者也松柏之茂每嵗而一新者也日與月則明與明之相承也山之夀則厚與厚之相承也松柏之茂則新與舊之相承也故曰無不爾或承則不特指松柏而言蓋兼日月南山而言之也是詩前三章言天之福吾君後三章言神之福吾君故三章以山阜岡陵喻其福之興盛以川之方至喻其福之盛長所以終首章而下之意六章以日月松柏喻其福之方進而不已以南山喻其福之有常而不變所以終四章而下之意當是時君以鹿鳴四牡皇華燕羣臣以常棣燕兄弟以伐木燕朋友而臣之所以答其君者如此君燕其臣臣媚其君此所以上下交德業成而均享盛大悠久之福也歟采薇首章言靡室靡家則敘其悲傷之情也言不遑啓居則敘其勤苦之情也而必曰玁狁之故則毒民不由其上不得已而應之所謂風以義也二章曰靡使歸聘勉之以先公後私也三章曰我行不來勉之以竭力致死也皆命戍役之辭也四章以下曰四牡業業言其壯也四牡騤騤言其強也四牡翼翼言其行列之整治也曰一月三捷期之以必勝也小人所腓訓之以恤下也玁狁孔棘戒之以不可忘備也皆命將帥之辭也卒章楊柳依依即采薇之時也雨雪霏霏即歲暮之時也重告之以歸期欲其知離别之不逺也曰載渴載飢則再述其勤苦之情也我心傷悲則再述其室家之思也且終之曰莫知我哀言莫知者乃所以見其深知之也遣將帥及戍役同歌同時故既言君子又言小人欲其同心也故曰於采薇見先王以人道使人其此之謂歟出車案六月之詩言六月棲棲戎車既飭正指建未之月而此詩言昔我往矣黍稷方華則亦夏正之六月也司馬法冬夏不興師而文王以六月行師於前宣王以六月出師於後何也蓋冬夏不興師者法之常也橫逆之來不得已而應之者事之變也變而不失其正此聖人之所以得人心也先王之法夷狄而侵中國其救之當如拯焚溺解倒懸揭匍匐而出之井惟恐少緩豈得以六月為解哉苟以六月為解而不急興師以救之則是縱外敵以釀禍而坐視腹心之受病也其為不仁甚矣人皆知宣王以六月出師而不知味黍稷方華之詞則文王固未嘗以六月而廢征伐也故下文曰王事多難不遑啓居苟非以多難之故則必不以六月而行師矣出車總論是詩之言赫赫南仲者凡三三章之赫赫美其城朔方之功也五章之赫赫美其伐西戎之功也六章之赫赫美其有振旅凱旋之樂也赫赫者威名光顯之謂非有一章之忠敬二章之戒懼三章之奮揚則亦安能有如是之赫赫哉三軍以將為主文王用一南仲而昆夷之患平於西玁狁之患平於北遂有以措中國於衽席之安其易所謂師貞丈人吉者歟杕杜杜之有實秋冬之交也秋而望之以至於冬冬而望之以至於歲暮把之可采則春又暮矣而征夫猶不歸也豈惟女心之傷悲而父母亦憂且病矣然而車則不載也人則不來也歸期之過已久而不至也則使我多為憂恤冝何如哉於是龜以卜之蓍以筮之合言於繇而皆以為近則征夫亦邇而將至矣是詩四章皆述其未至之思而不言其已至之喜蓋未歸之時其思念之切如此則既歸之時其喜樂之深有不言而喻者矣先王之於戍役敘其情而閔其勞所以説也説以犯難民忘其死其是之謂乎南有嘉魚樛木者勢之下曲者也甘瓠者蔓之延施者也木之下曲者必為物所附蔓之延施者必有附於物冝其纒繞固結而不可解也若君子之於賢者則如之何哉有其物而無其禮賢者不可得而安也有其禮而無其誠賢者愈不可得而安也酒醴以奉之幣帛以將之獻酬以行之誠意以求之庶可以安其心乎南山有臺此詩五章而樂只君子一句每章必疊言之其辭繁而不殺者所以深致其頌美祝願之意也細分之則美其德者凡四祝其夀者凡四而言其德與夀之效者各一無疆猶無期也黃耉猶眉夀也此祝其夀之四也邦家之光與邦家之基為對謂之基者言邦家必賴賢德而後安以固也謂之光者言邦家必賴賢德而後榮以顯也德音是茂與德音不已為對不已言其聲譽之無窮是茂言其聲譽之益盛此美其德之四也保艾爾後與民之父母為對民之父母言盛德之澤有以及當時之庶民也保艾爾後言夀考之效有以及於後世之子孫也此德與夀之效各一也前兩章先德而後夀故第三章極言盛德之效以終前二章之意第四章先夀而後德故第五章極言夀考之效以終第四章之意言之重辭之復而不厭者由其愛之深敬之至而不能已也盛王之所以待賢者如此賢者亦孰不樂為之用乎蓼蕭首章心之輸寫鬱結之散於中也燕且笑語和樂之見於外也譽則善聞之著於人處則樂意之在乎已又兼內外而言之也朝廷之禮以敬為主今而曰笑語譽處則是有和樂而無嚴敬忘其君臣之分而藹然兄弟朋友之相親其待之也厚矣其接之也誠矣彼忌刻之君又惡足以語此哉二章為龍為光美之也其德不爽戒之也夀考不忘又所以祝願之也赤芾金舄會同有繹則為龍為光矣彼交匪敖彼交匪紓則其德不爽矣萬夀無疆萬夀無期則夀考不忘矣夫諸侯固賴天子以為本根天子亦賴諸侯以為屏蔽苟諸侯之不朝事則王室之卑亦可知矣故觀其車服之盛享其多儀之誠而天子之心亦得以自慰焉則其以為寵光也豈一時之虛偽云乎哉湛露案燕禮將燕公揖賔就席主人獻賔獻公酬酢之禮畢命媵爵於公而後公為賔舉旅主人三獻及孤卿再媵爵於公而後公為卿舉旅主人四獻及大夫乃樂賔升歌獻工而後公為大夫舉旅其樂也工歌鹿鳴之三笙奏南陔之三乃間歌魚麗笙由庚以下遂歌鄉樂周南召南然後徹俎而燕主人五獻及於士賔媵爵於公而後公始為士舉旅自士舉旅行酬而上其升降揖讓之節繁矣其酌獻酬酢之文縟矣其笙歌間合之樂備矣禮成而樂闋日則暮矣雖有強力之人亦已倦矣乃於是而爵樂無算則夜飲之時也庶子執燭於阼階上司宫執燭於西階上甸人執大燭於庭閽人為大燭於門外此雖諸侯燕賔之禮然推而上之則天子燕諸侯之禮亦於是乎可想矣此詩前兩章言厭厭夜飲所以道其情之相親也後兩章言令德令儀又美其德將而無醉也顯則其心之明白允則其心之誠實德之令者固非酒之所能亂也豈則其心之和樂弟則其心之平易儀之令者固非酒之所能喪也既有令德又有令儀則雖醉而不至於顛倒錯亂審矣然則是詩也其亦褒美之中而寓規戒之意也歟彤弓饗盛禮也鐘鼓大樂也彤弓重器也行之以盛禮用之以大樂賜之以重器而所豫者則有功之諸侯也誠以將之而無偽速以畀之而不遲則天子之豫之也足以為禮而諸侯之受之也亦足以為榮矣六月首章先王之法子焉背其艾臣焉背其君皆天下之大變有能討之者許之先發而後聞其急如此所以然者以君艾不可一日而不尊天理不可一日而不明也今玁狁內侵不得已而應之雖六月出師而人不以為暴者知其過之不在於君上蓋以為所以勞我者乃所以安我也匡之為言正也玁狁橫則周室危攘玁狁周所以正周室也此述其始受命出征之辭也三章兵事不可以不嚴尤不可以不敬不嚴則無以一士心不敬則無以承上命書曰欽承天子威命敬也又曰威克厥愛允濟嚴也嚴敬二字乃用師之要道夫惟將帥皆嚴敬以共武事所以能定王國也四章玁狁惟不自度量故其大衆整齊既盤據於焦穫之間其輕軍掩襲復時出入乎鎬方之地且逺及乎涇水之陽焉其深入為冦如此可謂熾矣於是建旗旄選鋒鋭以攘之元戎者車縵輪馬被甲衡軛之上皆有劒戟所謂選鋒也然謂之十乘則為馬四十匹甲士三十人其為步卒亦不過七百二十人而止耳數非加多也而味其辭意則玁狁之難已若不足平矣所以然者惟其辭直故其氣壯惟其用之以律故每事而盡善彼玁狁雖衆且盛又烏足以敵王者之師哉五章聞之先人曰北伐之詩曰比物四驪此以其在後而殿者言之也知在後而殿者其色尚黑則左焉而青右焉而白從可想矣曰元戎十乘此以其居前而啓者言之也知居前而啓者其數必盈則知殿而在後者不過一乘又可想矣然則其為中軍也奈何曰既冇其前莫為之後不可也既有其後莫為之前亦不可也前有十乘後有四驪居其中者可安然而無恐矣故曰戎車既安是以其中軍而言也三語之中而軍制備焉此古人之詩所以為非後人之所可及歟采芑聞之先人曰北伐之詩先言後軍次言前軍又其次也乃言中軍非曰後其所當先而先其所當後也蓋出師之法賤者居前貴者居後是故先言後軍非先其賤者乃先其貴者也又出師之法勇者在前怯者在後是故次言前軍非勇者不如於怯乃勇而必示以怯也民知以賤事貴則其志冇定無僭踰之患矣民知以怯養勇則其氣不暴無挫折之患矣然後老者弱者居於其中雖甚畏且懦亦可恃以為安而無恐焉若夫軍之成數則有不言者矣惟南征之詩乃言其車三千者三焉一言之不足又再言之再言之不足又三言之以車之多可見其民之衆以民之衆可見其國之盛而凡其勞來於蕩析之餘還定於轉徙之後者其效益以著矣或曰牧野之車三百而已而新田之車乃至十倍牧野之數不已夸乎曰牧野之軍但言三郊不言三遂亦當有三萬七千五百言三萬者舉成數也新田之軍既言六鄉又言六遂四其三萬七千五百則為十有五萬輕車千五百兩重車亦當千五百兩適三千矣故知北伐之詩是言行軍之法南征之詩是紀行軍之實不言其法則無以見軍制之復不紀其實則無以見民數之復欲知宣王之復古觀此二詩而可見矣豈曰夸云乎哉車攻首章車攻馬同者言其軍實之盛也四牡龎龎則自君子之所乘言之也軍政修治於間暇之時而四牡充實於啓行之日則可以駕言而徂東矣三章徒之選旐之建旄之設皆有司之事也所以然者將欲從王搏獸于敖也徒手曰搏以見師徒之勇而其教之有素也四章諸侯之來朝也其來也非一方其止也非一所先後之不同逺近之或異此其所以連絡而布散也及其會同於斯也五等各以其爵兩階各以其班尊卑之有其序貴賤之有其等此所以陳列而聮屬也讀是詩者可以想見當時朝會之盛矣五章決以開體拾以遂弦二者相比則既佽矣弓之強弱矢之輕重二者相得則既調矣六章四馬皆黃色之齊也兩驂不倚御不失其正也不失其馳範我馳驅也此所以為御之良也七章田獵既畢軍旅旋歸觀者惟聞馬鳴之蕭蕭而已無雜聲也惟見斾旌之悠悠而已無亂次也徒御之不驚則其政之肅可知也大庖之不盈則其惠之均可知也八章前章言之子于苗而繼之以選徒搏獸即其始而言之也此章言之子于征而繼之以有聞無聲即其終而言之也夫有體有用斯謂之君子有始有終斯謂之大成存於中而有興衰撥亂之志所以立其體施於外而有內修外攘之事所以達其用如此得不謂之君子乎靜治於往狩之初所以成其始嚴肅於旋歸之際所以成其終如此得不謂之大成乎體用之兼備始終之無間此王道之所以為大而詩人所以贊美之也鴻鴈惠鮮鰥寡文王之所以興也哿矣富人哀此煢獨幽王之所以亡也爰及矜人哀此鰥寡宣王之所以中興也夫鰥寡孤獨乃天民之窮而無告者聖人一視同仁雖無一物而不在所愛而其發政施仁則必自鰥寡孤獨始誠使鰥寡孤獨各得其所則天下之民無不被其澤者矣先王之勞來還定安集其真有得於文王之家法也歟劬勞于野自其始之流連而言也百堵皆作自其中之還歸而言也此詩不作於流離之時而作於安定之日益痛定思痛者故知者以為勞苦而不知者則反以為宣驕也庭燎夜之未央此初問之時也而其心已不安於寢矣夜之未艾此再問之時也可以起矣而未可以出也夜之鄉晨此三問之時也臣辨色而入則君亦可以出矣未可以出而出則失之太蚤可以出而不出則失之太晚君子之視朝不蚤不晚惟其時而已雖然辨色而入者君子視朝之時不安於寢者君子勤政之心是心也即周公坐以待且之心也其致此中興之盛也冝哉厥後宴起至動賢后脫簪之諫則宣王之心少懈而中興之政亦衰矣鶴鳴知誠之不可掩則知念慮方萌而鬼神已知形迹欲掩而肺肝已見所以不可無誠身之功也知理之無定在則知事有精粗而理無精粗事有大小而理無大小所以不可無明善之功也知愛當知其惡憎當知其善則知親愛賤惡之不可以或偏哀矜敖惰之不可以自恣所以於應接之間尤不可不去其私欲之心也能是數者則知行並進而明誠兩立好惡不偏而人已兼盡其於治天下不難矣此所以為陳善納誨之辭也歟祈父先王之制諸侯有故則方伯連帥以諸侯之師討之王室有故則方伯連帥以諸侯之師救之司馬所掌封圻之兵甲不過衛王室而已此詩前二章責司馬不當以王之爪牙而逺從征役後一章責司馬不當以國之孤子而逺從征投使王而自棄其爪牙則謂之不智使司馬而棄王之爪牙則謂之不忠至於使孤子之無以為養則又謂之不仁一事而三失具焉其取敗也冝哉白駒白駒好賢而賢者卒不可留何也曰古之人君之好賢也必與之共天位與之治天職與之食天祿待之誠養之厚處之尊崇諫必行言必聽膏澤必下於民雖欲不留安得而不留今白駒之好賢不出於君上之誠心而顧出於臣下之私情故縶之維之以致其愛逍遙嘉客以致其慕賁然來思以見其欣幸之至母金玉爾音以見其期望之深而所謂爾公爾侯者特詩人假設之辭而非出於君上之真情也使其果出於君上之真情則莘野之耕夫方且以為阿衡傅巖之胥靡方且以置左右渭濵之釣叟方且以為尚父孰有已立於其朝而復有高蹈逺舉之意邪惟其留之而不可得此所以致其愛惜思慕之情雖足以見斯人秉彝好德之良心而時世之不如古亦可想矣斯干古人築室既成而落之必有頌美禱祝之辭如美哉輪焉美哉奂焉則所謂頌美之辭也歌於斯哭於斯聚國族於斯則所謂禱祝之辭也此詩言其基址之廣厚結搆之周密垣牆之堅固堂室之高深則美輪美奂之類也上有以續祖妣之業下有以開子孫之祥兄弟之相好室家之相安則歌哭聚族之類也堂之髙也以聽事室之深也以安身至於寢而夢興而占男子之為君為王女子之無非無儀則皆自夫君子攸寧而推言之也其必首及夫兄弟者人之居室夫婦之好易完也父子之恩易全也兄弟之相好而無相猶則非篤天倫之親者不能也果能篤於兄弟之好則冝爾室家樂爾妻孥和氣之益充大福之益集而子孫之繁衍基業之昌盛有不可勝窮者矣此所以為善頌善禱歟無羊首章三百以為羣其犉者九十所以見其多也濈濈以言其和濕濕以言其潤又以見其多而能善也降阿飲池寢處訛動物之適其性也蓑笠以禦暑雨餱糧以備飲食人之勤於事也色之無不備用之無不有則又以其效而言也三章四章薪蒸以供爨燎雌雄以備飲食見牧人不特勤於事又有餘力以及乎他也有堅強之力無虧崩之患見牛羊不特順其性又無疾病以致其損也麾之以肱畢來既升見人識物情物解人意而無事乎奔走追逐之勞也衆之為魚則自寡而變多也旐之為旟則自小而變大也此因牧事有成而及乎年榖之豐登人民之蕃庶皆頌禱之辭也節南山首章南山所以為民所瞻者以其勢之崇也師尹所以為民所瞻者以其位之崇也位之崇者德必有以稱之而其所為不善使我憂心內熱如火燔灼且不敢輕出一言以避禍然則周宗雖未絶亦終必亡而已矣王何為而獨不察乎不敢戲談保身之智也何用不監愛君之仁也五章國之危亡盡以為人事歟則日月剝蝕山崩川竭將興必有禎祥將亡必有妖孽固未可盡責之人也盡以為天意歟則武丁因桑榖之祥而戒懼以復成湯之業宣王因雲漢之災而戒懼以繼文武之功又未可盡歸之天也大抵人事之有得失氣化之有盛衰此皆治亂之所由惟君子為能以人合天不諉於天以義制命不諉於命則可以轉禍而為福轉災而為祥轉凶而為吉轉亂而為治天也有人焉君子不純以為天也使王能平其心以任尹氏尹氏能平其心以用在朝之君子而不以小人間之則豈至於危亡而不可救哉故善為國者亦反求諸已而已矣末五章幽王昏暴必無悔悟之理而家父作詩猶冀共改心易慮以畜養萬邦者拳拳愛君之心不敢謂其必不能而絶望焉厚之至也比干之於紂芮良夫之於厲王亦嘗以此望之矣紂惟不從比干之言故卒用飛廉惡來以至於亡而不悟厲王惟不從芮良夫之言故卒用榮夷衛巫以至於流而不悔幽王惟不從家父之言故卒用尹氏以至於危而罔覺蓋昏暴之君用小人以致亂未有不至於滅亡者書曰與亂同事罔不亡其是之謂歟總論案項氏曰幽王時為亂者皆宣王時故家率西戎以攻幽王者嵩高之申伯也為趣馬以亂朝者韓奕之蹶父也為卿士而貪殘擅政為大師而迷民誤國者常武之皇父尹氏也四人雖未必即其身亦必無皆死之理此説不然宣王在位四十六年大雅所美諸臣皆初年輔佐中興者幽王時未必存蓋皆其子孫也正月首章繁霜則天令乖於上訛言惑於下我心憂傷憂天變之無已也憂心京京癙憂以癢憂民言之益偽也京京言所憂者大則非止於一身也癙憂言其所憂之獨則有異於衆人也憂之而傷傷焉而至於病則其亡聊也甚矣二章父母之於子無所不用其愛而胡為使我至於如此之病乎使亂而在我之先則吾有所不及見固可以無憂也使亂而在我之後則吾有所不及知亦可以無憂也今不先不後而使我適當其時則安能以無憂乎虛偽之言但出於口而不出於心則聞其善言而不足以為喜聞其惡言而不足以為怒以其反覆而不可憑也是以使我憂之至於甚病而彼反見侵侮則其亡聊也愈甚矣三章念我無祿傷已之不幸也并其臣僕傷斯民之俱不幸也于何從祿未知其所從之人也于誰之屋未見其所止之處也此哀國之將亡而無所定之辭也四章福善而禍淫此天之常理也善者未必福淫者未必禍則以氣化自盛而趨於衰則常者有時而變此正其未定之時也方其未定則人或能以勝天及其既定則天必能以勝人然則今日之受禍者安知其不為他日之福而今日之受福者又安知不為他日之禍乎五章訛言之人是而謂之非非而謂之是其虛偽反覆甚矣非有明哲之君孰能辨而懲之哉故老明於臧否者也占夢明於吉凶者也此國之所賴以正訛者也令問之故老故老曰豫聖矣而未必明於臧否之理問之占夢占夢亦曰豫聖矣而未必明於吉凶之兆則亦誰能别其言之是非乎六章謂天為髙而我不敢不局懼其崩而壓也謂地為厚而我不敢不蹐懼其陷而墜也天地豈有崩陷之理而既號呼而為此言又自以為有倫理而可考何也當是時日食震電不寧不令則天雖未崩而實有崩之兆也髙岸為谷深谷為陵則地雖未陷而實有陷之形也況喪亂之極禍出不測豈可謂其可必無而不慮哉故又歎息而言哀哉今之人胡為虺蜴之行至於如此之甚乎然則天之崩不必憂也地之陷不必懼也而人之肆毒以害人則不可以不畏也七章求之甚艱棄之甚易即鄭氏所謂有貪賢之名無用賢之實者也八章桀之亡也非湯滅之也妹喜實滅之也紂之亡也非武王滅之也妲己實滅之也幽王之亡也非申侯西戎滅之也褒姒實滅之也然桀亡於妹喜而天下遂為商者以其有湯也紂亡於妲己而天下遂為周者以其有武王也幽王亡於褒姒而天下不至於易姓者以雖有褒姒以滅之而無德如湯武者以繼之也亦以見文武成康之遺澤其在人者未泯也噫當是時天命之眷眷於周者未釋也民心之眷眷於周者未厭也而幽王則用嬖妾以亂於內用羣小以亂於外而先自絶於天結怨於民則足以滅其身而已矣十章輻以湊轂輔以益輻僕以將車三者皆備然後可以不墮所載苟始之不謹則終之敗也必矣十一章魚之在沼其潛雖深而卒無所遁其形君子之在亂世其去雖逺而卒無所安其身故魚之在沼不如遊於江湖之為樂也君子之在亂世不如遭過治平之為快也此其憂之所以慘慘而日瘁也十二章旨酒嘉殽以合比其鄰里怡懌其婚姻惟優遊無事者能之若喪亂畏禍之人則其家之不能恤而何以合比其鄰里其身之不能保而何以怡懌其婚姻此君子之憂所以至於疾痛而自歎小人之不如也十三章佌佌而有屋則卑小者轉而豐大矣蓛蓛而有榖則窶陋者轉而富足矣而民今之無祿則是天獨厚於小人而椓喪於庶民也均之為椓喪也富者優於財而裕於力猶未至於甚困惸獨者罷於力而傷於財則豈不可哀之甚哉十月之交二章不用其行天之反其常也不用其良人之反其常也而天之所以反其常正以人之不用善而有以致之也隂固不足以亢陽然亢陽而不勝猶愈於勝陽而掩之也小人固不足以亢君子然亢君子而不勝猶愈於勝君子而陷之也三章日食震電此天之不寧不令也山崩水溢陵谷變遷此地之不寧不令也君人者父事天母事地父母震怒而恐懼修省猶可冀其怒之息也苟父母震怒而為子者漠然無悔悟之萌則怒將何時而解哉此亂所由興也四章兼總六官者卿士之職也而皇父實為之敷五典擾兆民者司徒之職也而畨實為之統百官均四海者冢宰之職也而家伯實為之內史掌八法之廢置師氏掌朝政之得失皆輔導王者也而以付之楀與聚子膳夫掌王之飲食趣馬掌王之馬政皆親近王者也而以付之蹶與仲允則小人之黨盛矣后妃主內治者也當求窈窕貞淑以為君子之配而以艷妻為之則嬖妾之焰熾矣有嬖妾以蠱惑於內有小人以煽亂於外此災異之所以繁興而亂亡之所以莫救也五章豈曰不時言其任智而自是也不即我謀言其挾勢而妄作也徹我牆屋則無以安其身田卒汙萊則無以食其力如是而猶曰非我戕汝乃禮之當然也夫下供上役固禮之常也然豈有作大事動大衆而不通衆志不盡下情者哉六章人臣之患莫大於自聖苟有自聖之心則謂天變為不足畏謂人言為不足恤謂君子未必勝於已謂小人未必害於事於是援富民以為黨殖厚利以自私上則不忠於君下則不惠於友而其禍有不可勝言者矣雨無正一章自其廣大而言謂之昊天自其仁覆閔下而言謂之旻天天之廣大也而飢饉以斬伐則是不大其慮也天之仁覆閔下也而有罪無罪俱陷死之則是不溥其仁也此章姑為怨天之辭以發闕二章周宗既滅言君有敗亡之兆也正大夫離居言臣有離散之心也人臣之義有與君同休戚者有與國同休戚者與君同休戚者君憂則與之同其憂與國同休戚者國亡則與之同其亡今而曰正大夫離居則非特無與國同休戚者亦無與君同休戚者矣然衆人皆去而已獨居則衆人皆逸而已獨勞雖有黽勉從事之勤孰得而知之哉三事大夫有官守者也而莫肯夙夜邦君諸侯有民社者也而莫肯朝夕則雖未至於離居而已莫有任其責者矣上章言飢饉天之變也此章言離居人之離也天之變既如彼人之離又如此則敗亡之兆即此而可見矣庶幾王改而為善乃覆出而為惡則天意豈可得而回人心豈可得而挽哉三章法度之言人君所恃以為國者也法度之言而不聽則猶射者之不求中夫的行者之不求至夫家亦將何所底至哉敬者古聖賢相傳之心法即所謂法度之言也能敬其身則能敬於友能敬於友則能畏於天而天變人離之禍庶幾其少息矣四章兵已成矣而為惡不退則人離而冦亂將益進矣飢已成矣而遷善不遂則天怒而飢饉將益甚矣暬御者王之近臣任涵養薰陶之責者也故憂之而慘慘日瘁然凡百君子莫肯以是告王則即上章正大夫之離居邦君大夫之莫肯夙夜朝夕者也聽言則答謂告君不盡其誠也譖言則退謂引身逺避其禍也斯人也愛君不如愛身之厚憂國不如憂家之深其自為計則得矣而以君臣之大義責之能無愧乎六章君子之仕將以行其道也若其甚急且危則其身之不能保其志豈得而遂哉是故將欲直道以事君則君既以為怒將欲枉道以從人則友復以為責此仕於亂世者所以進退皆病無所適而可也小旻首章敷于下土言天之暴虐其禍為甚遍也何日斯沮言人之邪僻其勢為未止也謀臧不從所謂惡人之所好也不臧覆用所謂好人之所惡也此之謂拂人之性災必逮夫身故我視其謀猶亦甚病也二章謀之其臧則具是違即所謂謀臧不從也謀之不臧則具是依即所謂不臧覆用也但上章指王而言此章指小人而言夫小人之事君喜則潝潝以相和怒則訿訿以相詆此其喜怒之不常也善者違之而不用惡者用之而不舍此其去取之不當也謀猶如此亦何能冇所定乎三章卜筮將以求之神而神則厭而不吾告詢訪將以謀之人而人則泛而不吾決蓋惟堂上之人方可以辨堂下之曲直今發言盈庭則是雜於堂下衆人之中果孰能任其責而決之乎譬之適國者必駕輕車就熟路而後可以言至若不行不邁而坐以謀之則言之雖善亦何能有所得哉五章恭從明聰睿五事之德也肅乂哲謀聖五德之用也恭則無不敬故肅謂其能嚴整也從則無不順故乂謂其有條理也明則無不見故哲謂其能察於事也聰則無不聞故謀謂其能度於義也睿則通乎微故聖謂能無不通也有是五者則以之修身而身修以之治國而國治然王不能用則雖有是善且不能以自存將如泉流之不反而淪陷以至於敗也小宛首章鳩之飛非可以戾天也而猶有時乎戾天人之貴本可以為善也而豈能不念昔之先人乎鳩之翰飛戾天勉而為高也我之有懷二人勉而為孝也勉而為孝則無所往而不善庶可以免於禍矣此兄弟相戒之意也二章齊則整肅聖則通明整肅者必不以酒而喪儀通明者必不以酒而敗德此所以能溫恭自持以勝也彼昏不知者反是吾兄弟安可以不敬乎敬則天命為可保不敬則天命為難恃其戒深逺矣三章中原有菽而庶民采之斯庶民之有矣螟蛉冇子而蜾螺負之斯蜾螺之似矣吾兄弟其可不思所以善其身不思所以教其子乎善其身所以繼吾親也教其子所以繼吾身也物之在外也猶可采而有之況性善本吾心之所有乎物之不似也猶可負而化之況子之性亦吾之性乃其本似者乎為此詩者其於保身於教子可謂兩得矣四章脊令之且飛且鳴其勢之不能以已也我兄弟之日邁月征亦其情之不能以已也夙興夜寐各務努力以求無忝於先人可也天之密運聖人之不已君子之自強皆此意也而此詩及之其亦有得於聖賢之學也歟小辨首章民莫不榖謂其皆有父母之親兄弟之懿也我獨于罹謂得罪於父子兄弟之間皆不能以保其樂也子以父為天父之不吾愛即天之不吾與也何辜于天我罪伊何自責不知已有何罪而不見愛於父也心之憂矣云如之何此詩本敘其哀痛迫切之情故以憂之一字為一篇之綱領下章凡七言之二章此章憂之一字凡三言之惄焉如搗憂之而至於痛也維憂用老憂之而至於衰也疢如疾首憂之而至於病也三章父猶天也母猶地也何所瞻而非父乎尊之至也何所依而非母乎親之至也毛者膚體之餘自其外者言之也裏者心腹之間自其內者言之也生之膝下一體而分而父母之不我愛也豈我外焉不連屬於父母之毛內焉不附麗於父母之裏乎無所歸咎則歸之於天曰豈我生時不善哉而何為使我至此極也四章五章譬彼舟流不知所屆言其泛然而無所止也譬彼壞木疾用無枝言其孑然而無所附也心之憂矣不遑假寐歎已之不遑安也心之憂矣寧莫之知歎人之莫吾恤也六章物之與我同生而異類者也而兔之走尚有哀而先脫之者人之與我同類而相踈者也而人之死尚有哀而掩藏之者蓋皆不忍之所發也若骨肉之親本同一氣冝無所不用其愛也而信讒棄逐曾投兔死人之不如則王之秉心亦忍矣是以心憂而涕隕心憂則哀痛之發乎中涕隕則哀痛之形於外也七章讒者之言未必遽可信骨肉之親未必遽可棄使王而加惠愛焉則猶有惻隱之心也使王舒徐究察之焉則猶有是非之心也今於我則不加愛是無復惻隱之萌矣又信之而不加察是無復是非之辨矣無惻隱之心不仁也無是非之心不知也惟其不知也故人之有罪者則舍之而不問惟其不仁也故我之無罪者則加之而不恤則其窮困亡聊亦甚矣總論小辨之詩處父子之變白華之詩處夫婦之變聖人備録於經所以著周室禍敗之由又以見天理民彝之不容泯也然嘗考之小辨之詩其前六章皆興白華之詩其八章皆比小辨之辭婉而切猶有望之之意處父子之間則然也白華之詩簡而莊不無責之之意處夫婦之間則然也小辨之詩其哀痛迫切之意具於首章其下不過自此而推之耳舜之怨怨已之不得乎親小辨之怨怨親之不容乎已雖所怨不同然以孟子之言推之親之過大而不怨則是恝然無情也恝然無情者視其親猶路人也其為罪不愈大乎冝臼巾人之資聖人亦姑取其一節之可觀耳固不敢以大舜之事望之也巧言二章涵者受之而不察信者聽之而不疑受之而不察此亂之所由以生聽之而不疑此亂之所由以成也怒讒則亂斯沮而怒讒固非優柔不斷者之所能也用賢則亂斯已而用賢固非昏昧不明者之所克也三章屢盟將以要言於神而神實弗福則亂安得而不長乎信盜將以肆虐於民而民用胥怨則亂安得而不暴乎味之甘者雖可食而或積毒以喪身言之甘者雖可恱而或致亂以喪國苟味其言之甘而忘其毒之慘則亂安得而不進乎且彼讒人亦何能為哉其職之不共其責之不任亦徒以為王之病而已可不戒哉四章寢廟之奕奕者惟君子為能作之以其法之定也大猷之秩秩者惟聖人為能莫之以其德之盛也以興他人之有心亦惟我為能度之以其鑒之明也狡兔之走疾矣而遇犬則其迹無所逃讒人之言巧矣而遇明哲則其情無所遁亦何益之有哉五章詳審而不暴質實而無偽此君子之所謂碩言也其出於口冝矣阿徇以為容逄迎以為恱此小人之所謂巧言也而豈可出於口哉自君子觀之不勝其可恥而小人之處此則顔厚而不以為愧也亦何望其能擴充羞惡之心而為不可勝用之義哉六章言此讒人所居之卑所稟之微惡疾之多而徒衆之寡非特以賤惡其人亦以見其本易驅除特王不悟而不能去之耳是可歎也何人斯五章六章一者之來云何其旴望之切也一者之來俾我祗也恱之深也未見而望之切既見而恱之深我之所以待彼者其故舊之情自若也而彼之所以待我者乃獨異於平時何也反覆委曲言之而讒者之情愈無所遁矣七章伯仲以喻其心之親塤篪以喻其聲之和如貫以喻其事之聮如是而猶曰不我知也則出此三物以詛之可也巷伯一章二章萋斐以成貝錦喻讒人者能因細小而飾成大罪也哆侈以成南箕喻讒人者能因疑似而構成實罪也始則以小而成大終則以虛而為實此讒人者所以能傾人之家國也三章緝緝者如麻之績繼續而不已也翩翩者如鳥之飛往來而自得也譖之初行既以不信而加諸人言之不愼亦將以不信而責於汝戒之也四章捷捷而儇利則非若訥者之遲鈍矣幡幡而反覆則非若木者之質朴矣好譖之初固為汝之受好譖不已又將於汝乎遷亦戒之之辭也六章投畀豺虎欲其食之也而豺虎不食則物之所不取也投畀有北欲其受之也而有北不受則地之所不載也闕惡哉其必有以制之矣蓼莪首章此詩諸儒皆以為興至集傳直以為比而其義始明凱風之子以棘自比棘固木之賤者也蓼莪之子以蒿自比蒿固草之賤者也凱風以已非美材故念母氏養我之劬勞則自責以期親之悔悟也蓼莪以已非美材而念父母生我之劬勞則父母已沒矣不過重自哀傷而已末章民莫不榖我獨何害者言民莫不有父母而我獨遭此閔凶也民莫不榖我獨不卒者言民莫不有父母而我獨不得終養也夫孝子行役不得以養其父母而形於歎詠者如陟岵鴇羽皆是也而蓼莪之詩獨使人誦之者流涕嗚咽而不能止何也曰陟岵鴇羽思念於父母尚存之日蓼莪之詩感傷於父母既沒之後父母尚存則雖曠廢於今日而猶幸來日之可繼也雖濶略於此時而猶幸他時之可補也則是猶有望也若父母之既沒則魂不可以復返神不能以永存容貌之不可以復見音響之不可以復聞雖有草旨無所奉之也雖有輕暖無所衣之也念生育之艱思顧復之勤罔極之恩既不可得而報則無涯之悲亦孰得而止之哉此蓼莪之所以作也噫彼父母俱存者猶未知是詩之悲也若父母既沒誦是詩而不三復流涕者是亦非人子也大東三章薪所以供爨必收蓄之而後可用若浸之於寒冽之泉則濕腐而不可爨矣民所以為國必撫字之而後可用若困之以暴虐之政則窮悴而不能勝矣吾所以契契憂苦寤寐而不忘永歎者正以哀我東國勞苦之人也然則如之何薪之既穫則必載而蓄之然後可爨也民之既勞則必其休而息之然後可用也四章東人之子職勞不來則雖以公子之貴而奔走往來其賤者可知也西人之子而粲粲衣服熊羆是裘則貧窶者且轉而富矣復百僚之是試則卑賤者且轉而貴矣别舟人私人言之者舉卑賤以見其餘也五章酒之厚也而不以為漿佩之鞙也而不以為長其出之也甚艱其視之也甚賤蓋羣小得志其意氣驕溢類如此然則貧富勞逸之不均吾將曷訴哉亦惟訴之於天而已漢之有光其亦能監視我也邪織女之七襄其亦能成文章以報我也邪其辭之婉而不迫如此詩人之忠厚亦可見矣四月總論此詩或以為行役或以為憂亂以詩考之由夏而秋由秋而冬則見其經厯之久由西周而南國由豐鎬而江漢則見其跋涉之逺此行役之證也父母先祖胡寧忍豫則無所歸咎之辭亂離瘼矣奚其適歸則無所逃避之辭此憂亂之證也專以為行役則先祖匪人之怨其辭過於深專以為憂亂則滔滔江漢之詠其辭過於逺然則是詩也蓋大夫行役而憂時之亂懼及其禍之辭也北山總論大東言賦斂之不均北山言役使之不均賦斂之不均則諸侯怨役使之不均則臣子怨夫臣之於君不擇事而安之所以為忠也而不免於怨何也蓋怨生於彼此之相形者也吾方盡瘁而彼則居息之燕燕吾方劬勞而彼則呌號之不知吾方畏咎而彼則飲酒以湛樂此勞與逸之相形也彼且息偃在牀而吾則征行之不已彼且棲遲偃仰而吾則鞅掌於王事彼且出入風議而吾則靡事之不為此親與踈之相形也均之為臣子也彼以其逸我以其勞彼若是其相親吾若是其相逺吾獨非人也邪大東之詩亦然東人之貴者勞西人之賤者逸東人之富者貧西人之貧者富均是人也而勞逸厚薄若是其相懸果能自己於言邪然則臣子之事君雖不可不竭其力而君之使臣要必有道矣為人上者其亦均平其心而無使其彼此之相形乎楚茨首章此章言由古人有墾闢之勞是以今日有收成之富由倉廪有收成之富是以宗廟有享祀之豐是以吾君獲福祿之大蓋力於農事所以致其勤也以奉宗廟所以致其孝也惟勤故致力於民者盡惟孝故致力於神者詳此古之賢公卿所以為不可及也二章此章櫽括輔氏語濟濟蹌蹌謂凡與祭之人皆有容儀也潔爾牛羊未祭則在滌而芻之方祭則毛以告純血以告殺之類皆是也自黍稷成而為酒醴至其為祭乃蒸嘗之時矣先蒸而後嘗先其盛者且趁韻也或有解剝其皮者或有烹而熟之者或有肆而陳之者或有將而進之者各有其人即此濟濟蹌蹌之衆也祊廟門內也凡祭祼鬯則求諸隂焫蕭則求諸陽索祭祝于祊則求諸隂陽之間蓋魂無不之神無不在求之之備如此此祀事之所以明也先祖是皇若有以見其大且有以見其尊神保是享既享其誠意又享其飲食即神具醉止之意也此孝孫之所以有慶也三章執爨踖踖對君婦莫莫言之踖踖敬也賤者能敬則貴者可知矣莫莫亦敬也在內者能敬在外者又可知矣為俎孔碩對為豆孔庶言之俎所以載牲體主於肥腯故曰碩豆所以盛內羞庶羞主於多品故曰庶或燔或炙對為賔為容言之主人獻尸賔長以肝從主婦獻尸兄弟以燔從則燔炙即此從獻之物而賔客即此從獻之人也其曰為賔為客謂筮而戒之使助祭者而非泛然賔客之謂也獻尸既畢而後有獻有酢有酬有旅則少長相勸交錯以遍而禮將終矣而禮儀則無一之不合於度笑語則無一之不得其冝言自始至終皆盡善也於是神保來格而報之以介福言其福之盛大也酢之以萬夀言其福之悠久也五章祀事既畢禮儀備矣鐘鼓既戒為尸出當奏肆夏預設以待之也孝孫往堂下西面之位工視以利養成畢告之所祭羣廟非止一神而皆醉矣皇尸則起而歸矣於是鳴鐘鼓以送尸謂奏肆夏也先已戒之至此乃奏之尸節神者也神醉而尸謖送尸而神歸諸宰徹去諸饌君婦徹去豆邊皆敏疾而不遲不以禮終而怠也祭畢歸賔客之俎同姓則留與之燕以尊賔客以致其敬親骨肉以致其愛也信南山百章此詩首章言地利之盡也此南山之下有神禹以甸治之於前若彼其可信也有曾孫以耕治之於後又若此其墾闢也於是而疆之理之使之為畛為徐為丘為甸則所以順地勢之所冝也使之為溝為洫為澮為川則所以順水勢之所冝也二章二章言天時之和也雪為豐年之兆冬將雪則雲一色雪乃氛氛而下至春又益之以霡霂之小雨既優而既渥而浹既霑而潤既足而豐故能生我百榖也三章三章言人事之善也田以井制其疆場翼翼然整齊其黍稷彧彧然茂盛皆曾孫之穡也於以為酒則三酒五齊之無不備於以為食則潔粢豐盛之無不冝於以畀尸則可以妥侑於以畀賔則可以獻酬於是而神降之福使之夀考萬年也四章四章言民心之恱豫也農民於田中作廬以便田事於畔上種瓜瓜熟獻之於君俾剝而削治之菹而淹漬之以祭祀而獻皇祖令君得夀考之福也甫田首章歲取十千言其賦斂之常也食我農人言其周給之仁也今適南畝言其巡省之勤也蒸我髦士言其勸相之備也二章上五句言報成之祭下五句言祈年之祭齊明犧羊禮之盛也禮以備物故於報成之祭言之琴瑟擊鼓樂之盛也樂以達和故於祈年之祭言之上言方社而不及田祖因方社以見田祖也下言田祖而不及方社舉田祖以見方社也上言農夫之慶歸其功於民也下言榖我士女溥其惠於下也三章曾孫之來以省耕為職者也田畯之至以勸農為職者也以其婦子饁彼南畝言其力之齊也攘其左右嘗其旨否言其情之親也禾易長畝終善且有言其效之著也於田畯曰喜於曾孫曰不怒互文以見意也田畯見之而喜曾孫見之而不怒則農夫益以敏於其事矣謂不待督趣而自勸也大田四章大田多稼總言其事以發端也既種既戒善其備於往歲也既備乃事致其力於今歲也以我覃耜利其器也俶載南畝耕之勤也播厥百榖種之時也既庭且碩生之盛也凡此皆以順曾孫之所欲也此言其處已之勤而事上之忠也二章既庭且碩言其初長時也既方既皂言其初實時也既堅既好言其將熟時也不稂不莠去其害苗之草也去螟螣蟊賊去其害苗之蟲也禾之稚者尤當有以愛護之無害我田稚盡其力於已也秉畀炎火求其助於神也三章上章言苗已盛矣害已除矣人力至而神惠昭矣所少者雨露之澤耳有淹蔞蔞雲之盛也興雨祈祈雨之徐也雨我公田遂及我私先公後私也稚也穧也秉也穗也本無異義詩人特致意於彼此二字以深見其豐成有餘而不盡取若曰彼處之田若是其遺棄此處之田亦若是其遺棄田雖不同而其禾之富有則一也彼人之心若是其忠厚此人之心亦若是其忠厚人雖不同而其心之惻怛則一也先公後私尊君之義也以羡補不足及衆之仁也蓋仁義之道上之人既以是而為教下之人復習是以成俗此周之盛時所以為不可及也瞻彼洛矣瞻彼洛矣維水泱泱言其形勢之壯盛也君子至止福祿如茨言其福祥之厚集也韎韐有奭以作六師言其人心之翕聚也形勢之壯盛得乎地也福祥之厚集得乎天也人心之翕聚得乎人也此周之王業所以有泰山之安磐石之固也周人尚文其弊也必起於弱故周公戒成王曰詰爾戎兵畢公戒康王曰張皇六師皆欲其振厲奮發以聳萬民之觀瞻一四方之趨向也此詩云天子至洛水之上親御戎服以起六師則必於此乎朝會於此乎田獵修戎備於間暇之時講武事於燕安之日據地利以合人心遵國典以承天意使斯民睹車馬之盛而知國勢之尊安見旗常之美而知王靈之赫奕是固福祿之所由聚邦家之所由安也夷厲而下王室偷安人心涣散朝事之不修武事之不講姬轍既東而天下無復中興之望矣顧洛水之泱泱寧不重為之有感乎裳裳者華此詩朱子以為答瞻彼洛矣則是天子會諸侯於東都講武既畢而燕飲之詩也夫尊為國君固非他人之所能左右也左之左之而無不冝是其才之全也右之右之而無不有是其德之備也冝者冝於外觀於朝廷而見其禮文之無不周觀於田獵而見其射御之無不善則信乎其才之全矣有者有於內即夫多儀之享而知其事上之敬即夫趨事之敏而知其有事上之忠則信乎其德之備矣惟其有之於內是以似之於外蓋容貌詞氣乃德之符其外之無可選擇如此則其中之所存可知有於中者所以為外之本冝於外者乃其中之似也頍辨椎親親之恩由兄弟以及甥舅亦其親踈之殺也前二章言蔦蘿施于木上以比纒綿依附之意此一章以雪之先集維霰以比老至而將死之驗方其纒綿固欲相依以永久也既而自知老之將至則亦豈能以久哉惟當樂飲以盡今夕之歡耳蓋君子之於兄弟親戚其相與之情無窮而相見之日有限以無窮之情乘有限之日則其飲食聚會亦真情之所不能已也死喪無口無幾相見此與唐風宛其死矣他人入室辭指略同而意則異彼欲及時以自娛樂此欲及時以相親愛也車牽首章首章言思孌季女則男至女家而親迎也曰德音來括則女至男家而成室也曰式燕且喜則既至而燕飲以相喜樂也正小雅有鹿鳴以燕羣臣有常棣以燕兄弟有伐木以燕朋友而獨於夫婦缺焉則此詩雖燕樂昏之詩其亦昏禮上下通用之樂也歟末章高山仰止景行行止於六義屬興而斷章取義則於行道進德之喻尤為切至蓋知高山之可仰則知聖德之可慕矣知景行之可行則知大道之可由矣由聖人之道以求至聖人之所止則所謂至善不外是矣然則仁之不如堯也孝之不如舜也學之不如孔子也猶之陟高山而不至其巔行大道而不達乎國都也是即所謂半塗而廢也豈不惜哉賔之初筵因射而飲者飲在射先因祭而飲者飲在祭後飲在射先者方有事於射其容體欲比於禮其節奏欲比於樂固不暇於醉也飲在祭後者禮行既久其筋力已竭其志氣少舒若可以醉矣而獻酬交錯之際禮儀欲無一之不合於度笑語欲無一之不得其冝則亦豈暇於醉哉噫禮莫大於射而因射而飲者其禮儀之備如此尤莫重於祭而因祭而飲者其禮樂之盛又如此則不惟不暇醉亦不敢醉矣此古人之飲所以無過舉歟三章至末章反反而謹重抑抑而愼密此溫恭之所為也幡幡而輕數怭怭而媟嫚則必至於屢舞且不免於號呶矣號呶者口之不謹也屢舞者手足之妄動也惟其手足之妄動故始焉仙仙而軒舉中焉僛僛而傾側終焉傞傞而不止是自伐其德也惟口之不謹則不當言而言不當語而語雖正之以監史罰之以童羖亦且奈之何哉采菽首章豫之以車馬所以為之乘豫之以衮黼所以為之衣其禮亦已厚矣而猶以為薄者蓋以車馬衣服之賜自先王以來所以懷諸侯者如此吾遵而行之非能有加於常禮之外也則其歉然不自足之意可見矣二章諸侯之來朝有旗焉所以昭其明也有和鸞焉所以昭其聲也有車馬焉所以昭其物也故觀其旗之淠淠而有以知其德之著聽其鸞聲之嘒嘒而有以知其德之和觀其載驂載駟而有以知其德之稱然則雖不言德而其德之令亦可想矣此所以為天子之所豫也歟三章禮以齊遫為敬彼交匪敖則萬福之所求彼交匪紓則天子之豫即福祿之所申也四章柞則有枝枝則有葉葉以芘枝枝以衛幹上下相承而根本堅固冝也天子必有緒侯諸侯必有左右諸侯以衛天子左右以衛諸侯上下相承而福祿厚集亦冝也詩解頤卷二
