body:
  text: 詩解頤卷三明朱善撰大雅三文王首章此章之意約言之而四句已足惟周公告戒其君言有盡而意無窮故反覆申之其徳之顯即於昭之謂也其命之時即維新之謂也其陟降在帝左右即文王在上之謂也然於昭以言其神而不顯又言其徳何也葢周家天命之新固本於文王之徳尤本於文王之神其徳之顯自其在人者言之也其神之昭自其在天者言之也光於四方顯於西土此其徳之在於人者然也其氣發揚於上為昭明此其神之在天者然也文王生而其徳昭著既足以膺天命之眷顧没而其神之昭明尤足以基天命於悠久方其以徳而受命文王與天猶二也及其昭明而在天則文王與天一矣惟其神之昭於天也故周之為國雖舊而周之受命則新斯命也非文王一人之命乃周家一代之命也其神之在天相與為無窮則其命之在後嗣亦相與為無窮文王之神即天之神也上帝之命即文王之命也上帝之陟降無一時而不監於人文王之陟降無一時而不同於帝則為後王者豈可謂天之高高在上而不吾察文王之神杳㝠恍惚而不吾知哉此章雖不言畏敬而不可不敬畏之意隠然已見於言外矣二章亹亹猶勉勉自聖人言之則純亦不已之謂也惟其徳之不已故其令聞亦不已惟其令聞之不已故天命之亦不已由其身以及其子由其子以及其孫而又及於無窮使其本宗百世而為天子支庶百世而為諸侯則可謂盛矣而又以為有是君不可無是臣也故又及其臣子使凡周之士其傳世亦無不顯者焉此詩言不顯者三有周不顯自聖人言之也不顯亦世與世之不顯自臣子言之也上章以徳言此章以世言惟其徳之顯是以其傳世亦顯也上章言文王之徳之神此章以下専言徳者周公告戒成王固欲其法先王之顯徳保上天之顯命非但欲其求之窈㝠恍惚而已也三章翼翼者勉敬之謂勉即文王之亹亹也敬即文王之緝熙敬止也文王之徳莫盛於此故文王之臣子亦無不取法於此而有是勉敬焉勉則能自强而不息敬則能主一而無適以之為已而身以修以之事君而國以治其謀猷如此宜其傳世之無不顯矣故又歎美之曰美哉此衆多之賢士而生於此文王之國也以多士而生王國謂非天命之保佑不可以王國而克生此多士謂非聖化之造就不可由天命之保佑而多士以生由聖化之造就而王國克生則信乎足以為周之楨幹矣牆非幹無以立國非人無以一此濟濟然之多士乃文王之所賴以安也四章穆穆者深逺之容著於外敬者戒懼之意存於中外深逺而内戒懼則表裏之如一既緝續而又熙明則始終之無間此文王之敬所以與天合徳也文王之受天命以其敬也商紂之失天命以其不敬也文王惟不已其敬是以大命集焉商紂惟不已其惡是以大命去焉天命之去就既殊則天位之隆替亦異而啇之孫子遂臣服於周矣雖有子孫千億之衆其若天命何哉五章膚敏以言其才之美裸將以言其職之共黼冔以言其服之常以商之士而服商之服若不改昔日之舊也然以其膚敏之才而奔走於周王之廟則今日之命非復昔日之命矣於是呼王之藎臣而告之曰得無念爾祖文王之徳乎使爾而不念厥祖則將墜厥緒而爾之臣子又將服周之服而助祭於他人矣藎者忠愛之篤惟其忠愛之篤是以欲其監戒之深也六章此章言法先王而修徳配命則福自我求若此其易也不法先王而修徳配命則失衆失國又若彼其難也為後王者可不以文王為法而以商為監哉七章遏爾躬者商後王之所以自絶於天也宣昭義問者商先王之所以克配上帝也二者不可不折之於天然上天之事無聲臭之可聞孰得而測之哉惟取法於文王則法其緝熙之敬而上有以得天心法其亹亹之誠而下有以得人心萬邦且作而信之矣我将之頌曰畏天之威畏天即所以畏文王也又曰儀式刑文王之典法文王即所以法天也天與文王一也大明首章天果不可信乎在下者有明明之徳則在上者有赫赫之命未嘗不可信也天果可信乎夏有昬徳而商受之商有昬徳而周受之其去就無常又未嘗必可信也惟天之不可信此為君之所以不易也紂居天位為殷之正適而乃使之不得挾四方而有之者葢天命未絶則為天子天命既絶則為獨夫故也二章由父母家言之則曰來嫁由夫家言之則曰嬪于京維徳之行者王季以明徳而治乎外大任以淑徳而治乎内乾健而坤順陽唱而隂和其志意無不同也有王季以為之父有大任以為之母此文王之所以聖也有文王以為之父有大姒以為之母此武王之所以聖也三章聖人之徳敬為大泛言之而為徳切言之而為敬敬者徳之輿也無敬則徳不行聖人之敬上與天心合下與人心合故以之事天非有心以求福也而自足以來多福以之治人非有心於求媚也而自足以受方國其徳之不回即其心之敬者為之也使此心之敬有一毫之空闕一息之間斷則不可謂之不回矣四章天命必有所厭也而後有所集以六百年之商將欲革其命而新之非監視之久而眷顧之深夫固不輕集也天命既集於文王則文王之配豈人力之所能為哉洽水之陽渭水之涘有聖女焉天實擬之以為聖人之配也而天命之集於周益可信矣五章俔天之妹言其猶天之女也納幣為昬禮之始親迎為昬禮之成文定厥祥敬其始也親迎于渭敬其終也造舟為梁重其事也不顯其光賛美之詞也六章有大任以為之母有大姒以為之婦故謂之纉言女徳之有繼也既生文王於前又生武王於後故謂之篤言天命之匪懈也其伐商也上以順乎天下以應乎人故謂之燮言其無慚徳也七章上帝臨女無貳爾心言處天下之大變當天下之大任當一以天命行之不可置毫髪私意於其間彼以人之衆寡事之成敗存於念慮者皆所謂私意也武王無是也而必云爾者以見牧野之事天命之所不容釋人心之所不容拒而非武王之得已云爾卒章此章述牧野之事然言其檀車之煌煌而已不及乎矛㦸之利則是無待於擊刺也言其駟騵之彭彭而已不及乎弓矢之良則是無待於貫革也言尚父之鷹揚而已不及乎徒御之衆則是無待於選鋒陷陣之勇也所以然者殷周之不敵久矣孔子曰仁不可為衆孟子曰征之為言正也各欲正己也焉用戰皆此意也㑹朝清明所謂一戎衣而天下定也緜首章案朱氏曰厥初生民自后稷始入此室處在邠公時已然此云爾者生民之詩是推始祖所自出緜詩首章是見民人所自來姜嫄生后稷建邦分土之由也稷封於邰而不窋竄去自有邰廢而周無民矣漆沮之豳又周之民人始生之地也夾皇遡過雖未已有宫室但穴處乃豳地所不能無謂之未有室家何怪哉況詩意主事大王肈基王迹文王克成厥勲以二王始終之者見在豳而小遷岐而大矣三章内則言婦養舅姑公食禮言君侍於臣皆以堇則堇乃美菜也七月言食農夫以荼則荼乃苦菜也周原之所膴膴然肥美所生堇荼皆甘如飴則苦者亦甘矣於是大王始以為可遷謂謀及乃心也又謀之於衆謂謀及卿士庶人也又契龜而卜之謂謀及卜筮也龜兆告吉乃告其民曰可以止於是而築室矣則大王之遷豈其然而已哉五章量地制邑度地居民司空之職也故先召之致衆庶令徒役司徒之職也故次召之定其位處揆其基地使不失其繩直此司空立室家之事也既正則束版以築築訖復升下而上以相承載此司徒命徒役之事也六章上章言作宗廟此章言治宫室也築牆之時取土而實之於器者其衆則陾陾然牆上之人受而投之於版者其聲則薨薨然既投之則從而築之其聲登登而相應也牆成而重復削治之其聲則馮馮然堅也五版為堵百堵同時而並興言民皆樂事勸功競欲致力其間雖鼛皷不能勝而止之見大王之得人心也七章臯門曰有伉自外觀之而見其高也應門曰将將自内觀之而見其嚴正也冡土曰戎醜攸行固將於此乎起大事動大衆非苟安於卑近而已也八章大王之去邠避玁狁之難也及其至岐則又有昆夷之愠焉昆夷之愠患之自外至者也内治之修政之由中出者也自外至者聖賢之所不能必由内出者聖賢必加勉焉葢君子創業垂統為其可繼者而已若夫成功則固有天命存焉然積累之既久培植之既厚至於木拔道通則屈不終屈而必於伸晦不終晦而必於顯昆夷之竄自有不期然而然者矣九章虞芮之質成是訟獄者不之商而之文王也歸者四十餘國是朝覲者不之商而之文王也文王之徳其孚於人也久矣至是而始動其興起之勢者譬之弩機之既張是惟無發發則沛然而不可禦矣詩人推本言之以為是雖文王之徳之盛而亦由此四臣之助而然葢舜之徳雖非五臣之所能及而非五臣則亦無以佐其治也文王之徳雖非四臣之所能及而非四臣則亦無以宣其化也書亦曰無能往來茲迪彛教文王蔑徳降於國人知此則知文王得人之盛而人才之為聖化之助亦大矣或者乃謂文王之化非四臣之所能為豈不異哉棫樸首章艽艽棫樸則薪之槱之矣薪以燎之所以致其用於今日槱以積之所以儲其用於後日也濟濟辟王則左右趣之矣左右使今之人固無不於此乎趣向左右輔弼之人又無不於此乎趣向也三章國之大事在祀與戎上章言人心之趣向見於祭祀之時此章言人心之趣向見於征伐之日也四章倬彼雲漢則為章於天矣言天道之大而有以成其文也周王壽考而豈不作人乎言聖壽之久而有以成其化也五章追者所以美乎金之文也琢者所以美乎王之文也旣追之而又琢之則所以美其文者至矣金者所以全其可追之質也玉者所以全其可琢之質也既金之而又玉之則所以美其質者至矣勉勉者誠之存乎中也綱紀者治之著於外也既勉矣而又勉焉則所以綱紀乎四方者至矣旱麓二章玉瓉之瑟然則必有黄流以注之器之美者味亦美也豈弟之君子則必有福禄以下之徳之盛者福亦盛也三章鳶飛而戾天魚躍而于淵物之囿於氣者有自然之機也豈弟君子而何不作人乎人之囿於徳者有自然之化也五章瑟彼柞棫不期於民之燎也而民自不能以不燎言物之盛者必為人所用也豈弟君子不期於神之勞也而神自不能以不勞言徳之盛者必為神所福也棫樸旱麓總論棫樸旱麓咏文王之徳必曰豈弟何也葢豈焉而樂弟焉而易此見文王之徳同一泰和元氣之流行而於其燕居之時有春生而無秋殺有陽舒而無隂慘此所以能作興天下之材綱紀天下之治不惟有以斂是福於一身尤必有以敷是福於庶民也論語記夫子燕居之容曰申申夭夭申申者其容舒夭夭者其色愉即豈樂弟易之謂也知文王則知夫子矣知夫子則知文王矣噫此文王夫子所以為安而行之之聖而非賢者之所可企及歟思齊首章此荘敬之大任乃文王之母謂文王生於大任而大任有荘敬之徳則文王之聖敬其氣禀有自來矣大任上能致孝於姑媚周姜以盡婦道下能示法於婦而大姒又繼其美徳之音是大姒之徳亦大任之徳也大任以敬徳而生文王大姒以美徳而百斯男則文王於此夫何憂哉二章先神而後人尊卑之序也先家而後國親疏之殺也誠以事神而神無不格誠以治人而人罔不孚此所謂接神人各以其道也三章雝雝者和之至也所以為治人之本也肅肅者敬之至也所以為事神之本也不顯自其在己者言之亦臨則指其在神者而言也無射自其在人者言之亦保則指其在己者而言也已之所處雖在於幽隠而心之戒懼則常若有臨之者人之於我雖無所厭射而心之操存則常若有所守焉所以為純亦不已之實也四章戎疾不殄難之自外至者聖賢有所不能必也烈假不瑕徳之由中出者聖賢未嘗不自安也不聞亦式其知生知不思而得故稽之往古而不謬也不諌亦入其行安行不勉而中故質之當今而無疑也此所以為性與天合也五章成人之所以有徳小子之所以有造以古人之無斁也古之人謂誰指文王而言也夫惟文王有不已之誠是以斯士皆有俊又之美也皇矣首章皇矣上帝臨下有赫言其威命之顯也監觀四方求民之莫言其主宰之公也彼夏商之政既失其道天之絶之也久矣故求之四方之國其未得之也則於是而尋究之於是而謀度之其既得之也復於是而耆定之於是而增大之乃眷然顧視西土以此岐周之地與大王為居宅焉然則天豈私我有周哉其眷周也即所以求民之安定也二章上章此維與宅一此字指岐周而言此章八其字復指岐周而言岐周本險阻山林之地大王居之而民之歸者益衆於是競刋除之所作而拔之屏而去之者是其地之菑而翳者也所修而理之平而治之者是其地之灌而栵者也所啟而拓之辟而開之者是其地之檉而椐也所攘而去之剔而剪之者是其地之檿而拓也檿拓美材可以養蠶非可刋除者也惟穿剔去其繁冗而已然則作屏修平啓辟皆所以刋除其木而攘之剔之又所以成長其木也大王之遷於岐非人力所能為也乃上帝遷此明徳之君使之内治既修則逺夷自遁逺夷既遁則國勢益張而又以為有明徳以治其外不可無賢妃以助其内也故又立之配焉凡此皆天之所以厚我有周也三章王業之成雖在於武王得天下之時而天命之定已見於泰伯讓王季之日泰伯讓焉而無迹王季受之而無愧此王業之所由基也文王創造於前武王繼續於後此王業之所由成也泰伯當立而不立文王可為而不為故皆謂之至徳非王季之友無以成泰伯之志非武王之孝無以成文王之功武王之孝易知也王季之友難知也此因心則友則友其兄則篤其慶載錫之光詩人所以再三歎咏於王季也四章帝度其心使之能權也夫惟能權故能受泰伯之讓而篤周家之慶也其徳之清静者體之所以立克明以下六者又其用之所由著克明者其徳足以知人克類則明之察也克長者其徳足以長人克君則長之大也克順者其徳足以和民克比則順之至也此章専美王季之徳故言之特詳至於文王則但言其徳之靡悔而已然謂之靡悔則其徳之純一無間亦可見矣惟其徳之無間是以其福之無窮也五章人心必有所畔而後有所援必有所歆而後有所羨畔者疎而離之援者親而附之也歆者欲之動乎中羡者心之慕乎外也斯二者皆溺於人欲之流者也文王無是二者葢天實使之而非人力勉强之所能也故能先知先覺以造道之極焉宻之敢拒大邦不知有事大之禮也侵阮徂共不知有恤小之義也此天理之所當怒而王法之所當誅也故赫怒整兵以遏其衆則其伐宻也初非有所畔也其救阮也初非有所援也兵之所在陵曰我陵池曰我池初非利其土地人民而有所歆羨也此所以能厚周家之福而荅天下之心也六章依其在京言文王安然在周之京猶所謂居其所不動也夫聖人豈有利天下之心哉其侵自阮疆也亦因其可怒者而怒之耳然文王以聖人之徳當方伯之任則諸侯之人民即吾之人民也諸侯之土地即吾之土地也兵之所至罪人斯得而孰敢陳兵於陵以拒我飲水於泉以抗我哉於是相其高原而徙都焉以山言之則在岐之陽以水言之則在渭之將此萬邦之所方向下民之所歸往也而其勢之盛已勃然不可禦矣七章不大聲以色言其徳之不形也不長夏以革言其功之無迹也不識則不至於作其明不知則不至於作其聰言一循乎天理之自然而與天同體也仇方其所讎者也兄弟其所友者也詢仇方而知崇之不可以不伐同兄弟而知兵之不可以不戒於是以伐崇墉焉葢亦怒其所可怒而莫非順帝之則也八章閑閑然徐緩言設而不用也言言然高大言縱而未攻也連連則相續而不絶也安安則詳審而不暴也是類是禡昭其罪於神也是致是附敷是徳於人也此四方之所以莫敢侮也茀茀然强盛則非徐緩之比矣仡仡然堅壮則猶負固不服也於是伐以聲其罪肆以奮其力絶以殄其祀忽以滅其國則天誅不留而罪人斯得矣此四方之所以莫敢拂也靈臺首章望氛祲察災祥憂民之憂也時觀游節勞佚樂民之樂也臺而謂之靈神之也曷為乎神之以其不終日而成也不終日而成果文王之心乎非然也文王之心固戒以勿亟而斯民之心則自如子來也然則勿亟者聖人愛民之仁而子來者斯民事上之忠也二章臺下有囿則從而謂之靈囿囿中有沼則從而謂之靈沼王而時在靈囿也則見其鹿之攸伏言其性之適也見其鹿之濯濯言其體之充也見其鳥之翯翯言其色之潔也此飛走者樂其為飛走也王而時在靈沼也則既見其魚之牣而其多可知也復見其魚之躍而其適可知也此鱗介者亦樂其鱗介也總論前二章言靈臺之游觀後二章言辟雍之教育游觀而言其物之盛者以見涵育長養之有素也教育而言其樂之和者以見鼔舞作興之有術也然則臺池鳥獸之樂固與百姓共之而鐘鼔之樂又將與賢者共之也下武首章聖人興王之業非先后固無以基之於前而先后在天之神非聖人亦無以配之於下葢一代興王之業必世徳之相承有以基之於其始而後聖徳之受命有以成之於其終也周之王業自文王而始著自武王而始成是文王武王實造周矣然推原其始則文王之前固有王季也王季之前又有太王也謂王業之所基不在於是而可乎夫惟太王王季文王既沒而其精神上與天合也是以武王繼之實能配彼在天之靈於鎬京則武王之繼三后謂非王業之所成而可乎詩人於此原其始而推本於三后要其終而歸功於武王則夫任繼述之責者其必知所法矣二章此章二配字不同王配于京是以下而對乎上之辭永言配命是以人而合乎天之辭有以配對於下而已之徳既與先王而為一有以配合乎天而已之心復與天理而為一此所以能成王者之信而天下之法也然則王者之信豈可以他求哉亦在乎求世徳配天命而已葢世徳皆實心之形著而天命即實理之流行既有以配對於先王復有以配合乎天命則王者之徳著於下而天下之心應乎上上下交孚而其為信也成矣三章求世徳配天命所以能成王者之信而其信之可法正以其孝之可法也長言孝思而不忘者一飲食之頃而如見於羮一坐作之頃而如見於牆一陟降之頃而如見於庭無一處之不然亦無一時之不然也若有時而忘之則是勉强矯偽之所為也而豈足為天下之法哉五章繩祖武者欲後人繼武王之迹也武王之道惟信與孝而已然武王之信乃王者之大信固非暫焉作輟之所能武王之孝乃天下之達孝尤非暫焉勉强之所能也然則如之何曰法武王之信在乎天命之永配法武王之孝在乎世徳之是求如是而不受天之祐者未之有也文王有聲首章文王惟有安天下之心故能成安天下之功惟其有安天下之功故能有高天下之譽即其聲之大而知其功之盛即其功之盛而知其心之勤此文王之所以為克君也二章大命自文王而始集故武功自文王而始成伐崇所以除天下之暴作豐所以立天下之本有以除天下之暴則人心服有以立天下之本則人心歸此文王之所以克君也三章遹追來孝文王之孝也永言孝思武王之孝也文王之孝有以追先人之志武王之孝有以成文王之功此周之王業所以盛也五章豐水東注言其水勢之順也四方攸同言其人心之合也即水勢之順而有以見神禹之功即人心之合而有以見武王之徳武王因人心之合而益有以盡其君道之隆則不惟近無愧於文王而且逺無愧於神禹矣六章四方攸同皇王維辟見武王之盡君道也鎬京辟雍無思不服見武王之盡師道也君以治之而四方無不於此乎攸同師以教之而四方無不於此乎心服則其尚徳而不尚力於此亦可見矣七章武王之遷鎬非以狥一己之私也必考之於卜以定其宅焉惟龜為能致其決惟武王為能成其事則武王之遷固将上以承天意下以順民心前以承先王之志後以開無窮之基信乎其克君也哉八章豐水則有芑矣而武王豈無所事乎水之流不窮則其生物亦無窮也聖人之徳無窮則其善後亦無窮也於孫謀曰詒則所以遺之者至矣於翼子曰燕則所以安之者至矣彼苟一時之安而不為悠久之計者又惡足以語此哉生民三章牛羊之腓䕶之以其股也鳥之覆䕶之以其翼也人之㑹伐平林則又收而置之懐抱也人與我同類者也物與我異類者也而無不有愛䕶之意以見天之所生固非人之所能棄也實覃實訏言其形之大也厥聲載路言其聲之大也此稷之所以異於人也於是始收而養之則亦知其受命於天而不可以常兒待之矣五章后稷之穡其種雖降於天其相之實在於己苟不能致其人力之助則豐草之不茀嘉榖必不能與之而並生矣實方實苞自其漬種時言之也實種實褎自其始苖時言之也實發實秀自其始穟時言之也實堅實好自其始實時言之也實潁實栗自其實熟而收成時言之也自種而苗自苖而秀自秀而實無所往而不致其人力之助此稷之播種所以大有功於斯民而有邰之封所以享無窮之報也六章稷之降種其名不一而此獨以秬秠穈芑言者自其種之事而可以供祭祀者言之也秬秠可以供鬱鬯穈芑可以供粢盛故降之於民使得以徧種之種焉而成成焉而穫穫焉而任負以歸於是為鬯酒以降神為粢盛以享神此自其始封時言之也七章所舂而揄者即此秬秠也所簸而蹂者即此穈芑也浸於盆而淅之其聲叟叟然盛於甑而烝之其氣浮浮然將以釀鬱鬯之酒供簠簋之酒備三酒五齊之獻也物既備矣於是而載謀則卜日擇士之無不善也於是而載惟則齊戒具修之無不至也取蕭祭脂宗廟之祭也取羝以軷行道之祭也諸侯之祭莫大於宗廟有朝聘之事則軷祭焉上自宗廟下至軷祭悉舉之矣或取肉傅火而燔之或取肉貫之加火而烈之四者皆祭祀之事凡此者皆所以興來嵗而繼往嵗也八章上章言后稷之祀此章遂言今日尊祖配天之祭夫莫髙於天莫尊於帝若不可得而感格也而香之始升上帝已安而饗之豈為其黍稷之馨得其時而已哉盖自后稷之肇祀也載謀載惟之致其誠取蕭祭羝之致其謹載燔載烈之致其戒固未嘗有一毫之罪悔由后稷而公劉公劉之心無以異於后稷也由公劉而大王大王之心無以異於公劉也由大王而文武文武之心又無以異於大王也今至於後王之時矣而此心之敬畏猶前日也則上帝之饗之也豈徒以其物哉正以周人之用心同一敬以之相傳也總論首章述姜嫄禋祀之祥二章述后稷降生之易三章述其生而有見棄之事四章述其幼而有種植之志五章述其教稼穡而受封六章述其降嘉種而肈祀七章備言后稷祭祀之誠八章備言周人尊祖配夭之義以終前章之意行葦侍御之盛言其人之不之也獻酬之盛言其禮之無闕也飲食之盛言其物之豐也歌樂之盛言其聲之和也前兩章未射而飲燕之始也故備言其禮樂之盛後二章既射而飲燕之終也故惟致其頌禱之誠言之固有序也既醉二章上章言介爾景福此章言介爾昭明則昭明者亦指福之高明光大而言耳不必以徳言也三章昭明高朗言其福之光大令終言其福之悠久此詩之言昭明高朗猶天保之言單厚多益若以徳言而實以福言也總論籩豆静嘉孝誠之著於物也朋友攸攝孝誠之寓於人也孝子不匱孝誠之傳於後嗣也室家之壼孝誠之形於内助也錫爾以祚所以厚其身也錫爾以𦙍所以昌厥後也釐爾女士則室家之深逺而嚴肅者非止於一世從以孫子則嗣子之孝誠而不竭者非止於一人也此皆述所告之詞也假樂首章嘉言其徳之可嘉樂言其福之可樂顯明也今善也明則光輝而有耀善則純粹而無瑕此其徳之所以為美也宜民宜庶民也宜人宜百官也受禄受天百禄也此自其已然者言之也保如天保之保謂有以安之右如左右之右謂有以助之也命如命令之命謂有以付畀之也申重也既保之而又保之既右之而又右之既命之而又命之所謂申之也此自其無窮者言之也徳之顯而且令所以為可嘉命之保右而申之所以為可樂二章王者之所干者禄也而可以得百福焉禄指其一端言之福指其全體言之也子孫千億言其多也穆穆皇皇以下言其賢也多而能賢所以能保天命於無窮也穆穆皇皇以徳言也冝君冝王以位言也不愆不忘以其心言也率由舊章以其法言也必有穆穆皇皇之徳而後可以冝君王之位必有不愆不忘之之心而後可以遵先王之法三章穆穆皇皇總言其徳之美也抑抑秩秩詳言其徳之善也不愆不志言其心之敬有以修諸己也無怨無惡言其心之廣有以容乎人也率由舊章言其能循用先王之法率由羣匹言其能全用天下之賢也皆自王者之子孫言之也然前章干禄百福子孫千億則言王者之福本乎天而有以及後世所以為祝頌之辭也後章受福無疆四方之綱則言子孫之福本乎徳而有以及天下又所以為稱願之辭也末章之綱之紀以事言也不解於位以心言也燕及朋友自羣臣言之也民之攸暨自庶民言之也人君能綱紀四方則既有以安其臣矣而臣子愛君之心又欲其不解而有以安乎民焉厚之至也不解于位即周公所其無逸之意此稱願其子孫之辭也公劉首章匪居匪康言其心之勤也迺場迺疆言其事之理也田疇既治然後居者可以有積倉行者可以有餱糧所以匪居者為思輯和其民人不欲安於山戎之陋也所以匪康者為思光顯其國家而欲復乎后稷之業也於是以其弓矢斧鉞之備啟行而遷都於豳遷都必用武備者一以壮國容一以防外患也三章自下觀之則往彼衆水之所聚而又望彼溥廣之原自上觀之則升彼南山之岡脊而乃見高大之京丘是京也乃大衆所宜居者於是經畫以定之於此作民居以處其處者於此作客舍以廬其旅者於此施教令而言其所言於此議政事而語其所語無不於斯焉此章言營度邑居之事也四章于京斯依言其即京師以為安也蹌蹌濟濟言其㑹羣臣而有儀也俾筵則或肆之筵也俾几則或授之几也登則登斯筵羣臣之所同也依則依斯几耆老之所獨也執豕于牢非必牛羊之厚也酌之用匏非必金玉之華也遷國之初崇簡儉也於是而食之将以勸之飽也於是而飲之将以侑之醉也於是而君以統之對羣臣而言也於是而宗以主之對衆賔而言也五章國之始遷莫先於奠民居其次莫如定軍賦正稅法既溥既長言其芟夷墾闢之廣而長也既景乃岡以下言其望景觀卜之詳而備也其軍三單言軍制雖不可以不定而非悉民以為兵也徹田為糧言田制雖不可以不定而非竭民以奉上也大王之自西徂東則自水之西而往乎東言其治之遍也公劉之度其夕陽則自山之東而至乎西言其居之大也皆以見民之歸者日以衆而田之闢者日以廣也六章于豳斯館為客舍以居也涉渭為亂為方舟以濟也取厲為斤斧之用不可以無砥也取鍛為宫室之用不可以無鐵也止基言其居室之初定也迺理言其田疇之初治也衆者人之多即止基之騐也有者財之足即迺理之效也夾澗而居則或處其東或處其西也遡澗而居則前依乎水後依乎山也其止居之衆日以益宻乃復即芮鞫而居之要其終之盛而言也卷阿首章有卷者阿則可以游歌之地也飄風自南則可以游歌之時也來游來歌君以和平之音唱也以矢其音臣以和平之音和也此所謂總序以發端也天下之可樂者莫如於泰和盛治之時而所可慮者亦莫如於泰和盛治之時曷為其可樂而又可慮也葢泰和盛治之時以三光則得其明以四時則得其序以庶類則得其所萬國有咸寧之效而黎民有丕變之風是誠可樂也然治極而不戒則衰亦於此乎萌日中則必昃月盈則必虧天地盈虛與時消息而謂治可保其常不亂盛可保其常不衰乎此其所可慮也夫惟慮之於極盛之時此有虞之廷所以有舜與臯陶之賡歌有周之卷阿所以有王與召公之矢其音也二章伴奐以游偃優游以休息則是當閒暇之時享和平之福此其已然者也又當使爾終其壽命似先君善始而善終則所以保之於無窮也周之先公后稷教民稼穡而封於邰公劉自西戎而遷於豳古公自漆沮而遷於此皆能自小而大由微而著而享壽考福禄之盛成王以持盈守成之主而欲似先公之善始善終則所以致此者必自有其道矣此所以廣王心而歆動之也三章王者之都雖止乎千里之逺而其封域則極乎四海之廣昄者大也言其無不包也章者明也言其無不治也厚者如地勢之重厚言其無不承載也郊焉而祭天社焉而祭地所以為天地之主也望焉而祭山川所以為山川之主也廟焉而祭人鬼所以為人鬼之主也四章受命之長以壽考言也茀禄之康以福禄言也上章欲其如先公之善始善終為百神之祭主此言純嘏爾常則欲其兼二者而常享之也五章六章王者在前則有馮在側則有翼所用以馮依者惟此孝徳之人所用以輔翼者亦此孝徳之人也以是人也而引導乎其前即有馮之謂也以是人也而輔相其左右即有翼之謂也能孝則慈祥有徳則篤實與慈祥之人處則可以興起其善心與篤實之人處則可以薫陶其徳性善心生而外有以鎮其躁徳性定而内有以消其邪有以鎮其躁而為顒昂之尊嚴有以銷其邪而為圭璋之純潔純潔之至播而為今聞則其徳音秩秩而有常矣尊嚴之至發而為今望則其威儀抑抑而慎宻矣夫如是則君子之徳信乎其豈弟矣四方為則謂天下以之為準則也四方為綱謂天下以之為綱領也既有以為天下之法又有以統天下之法此無他由有上章之得賢是以有此章之成徳也七章八章此章通下章言之則為興就此章言之則為比如以為比則鳯皇者賢材之喻高岡者朝廷之喻梧桐者賢君之喻朝陽者明時之喻也鳯皇之鳴高岡猶賢者之在朝廷也梧桐之生朝陽猶賢君之馭明時也鳯皇非梧桐不棲猶賢者非遇明君則不仕也非朝陽不鳴猶賢者非遇時明則不出也惟其有菶菶萋萋之盛是以有雝雝喈喈之和則其一時感㑹之機葢可想矣又曰高岡非潜伏之地朝陽乃明盛之處賢者出潜離隠而逢明君致治之時也其相遇之盛既如此必君盡其禮猶梧桐之菶菶萋萋臣得展其所藴猶鳳鳴之雝喈然其相與之盛當如此今而後賢者集於王朝矣禮意之隆則有望於成王矣民勞首章言民之勞苦甚矣庶幾其少安乎京師者諸夏之本惟當恵此中國以綏安乎四方可也小人為惡内則詭隨以悦其君外則冦虐以害乎民皆所謂無良也非詭隨無以媚上而為冦虐之本非冦虐無以威下而遂詭隨之志詭隨者柔惡之所為冦虐者剛惡之所發苟不禁而絶之則是不畏天之明命也而可乎能邇則恵中國之謂柔逺即綏四方之謂逺者懐而安之邇者順而習之即有以定王室矣二章無良者行之不謹也惽怓者言之不謹也憯不畏明言其不知天怒之可畏也無俾民憂言其當知民怨之可畏也無棄爾勞勉之以修其職業之詞也三章敬慎威儀欲其修身也以近有徳欲其親賢也修身以為之本親賢以為之輔則必不至於縱詭隨而為冦虐矣板首章治者天道之常亂者天道之變今天反其常道是以使民至於盡病而任大臣之責者乃出言不求其是為謀不求其逺靡聖則無所師法也管管則無所依據也不實於亶則無所持守也是皆謀之未逺而然也故我用大諌於汝汝可以莫之察乎二章天之方難則冝兢兢焉恐懼而豈可欣欣以豫悦乎天之方蹶則宜業業焉戒謹而豈可沓沓以弛緩乎輯者和也言於天理無所逆也此民之所以洽也懌者悅也言於人情無所咈也此民之所以定也三章我之於爾其職分雖不同而其為王臣則一故就爾而謀之将以輸其忠也而爾乃囂囂而自得則是諱疾而忌醫也然我所言者乃今日之急務汝其可以為笑乎古人所以詢及芻蕘者誠以淺近之言至理存焉不可以其人之賤而忽之也況於寮友之言其可忽而不聴乎四章老夫灌灌知天命之可畏而盡誠以相告也小子蹻蹻不知天命之可畏而大言以相欺也匪我言耄自老夫灌灌者言之也爾用憂謔自小子之蹻蹻者言之也夫憂不可戲也苟以憂為謔則積之之多将如火之燎於原而不可得而撲滅矣五章夸毗者言之無常也卒迷者行之不謹也載尸者善人之不用也殿屎者庶民之胥怨也此所以至於喪亂而卒無能順恵我之師衆者也六章天之開民如壎篪之相和壎唱而篪和言必應也如璋圭之相合合二璋以成圭言必同也如往取物之必得一手携物之必從也携而必從非别立一道以増益之也因其所固有耳牖民之道其易如此上之化下其道獨不然乎七章大徳之人所以為君之藩籬也萬民之衆所以為君之垣墻也國之强大者所以為吾之屏蔽也族之强盛者所以為吾之楨幹也同姓之宗子又所以為吾之城也五者皆君之所恃以為安也而徳其本焉人君能惟徳之懐則得是五者之助而安矣不能惟徳之懐則失是五者之助而不安矣不安則同姓先有離心而城壊城壊則藩垣屏蔽皆壊而獨居獨居而禍亂之至斯無日矣豈不可畏之甚哉八章天之怒不可不敬也汝其敢戲豫乎天之變不可不敬也汝其敢馳驅乎昊天曰明及爾出王言一出入之際而天必與之俱也昊天曰旦及爾游衍言一動息之頃而天必與之同也此所謂陟降厥士日監在茲也此君子之學所以必戒懼慎獨之為貴也蕩首章此章正意在靡不有初鮮克有終二句夫自其初而言之人性皆善厲王之性亦文武成康之性也而何不善之有及要其終而觀之則文武成康若彼其仁厚而厲王若彼其暴虐何也葢文王性之者也武王身之者也成康困知勉行者也厲王自暴自棄者也惟其自暴自棄也故與之言仁義之言則拒之而不信與之行仁義之行則絶之而不為然則非天命之多僻也乃王之逆天命而自底於多僻也非天命之匪諶也乃王之逆天命而自為是匪諶也非天命之多僻非天命之匪諶則其蕩蕩者固自若也而豈可以疾威言之哉固知其為怨天之辭而非天之實有是也二章厲王之惡貪暴而已惟暴也故所用皆强禦之人惟貪也故所用皆掊克之人曽是在位謂以之而居公卿百執事之位曽是在服謂以之而任公卿百執事之事也强禦也掊克也即所謂滔徳也而以為天降之者世之有治有亂雖本於人事之得失亦闗於氣化之盛衰然則汝之興起此人而力為之也果孰使之然哉亦不得而不歸於天矣三章善類之不用則所用者强禦冦攘而已强禦則暴虐之臣也冦攘則聚斂之臣也暴虐之是用則既有以殫民之力聚斂之是用則復有以竭民之財此怨懟之所以生流言之所以興而詛祝之所以無窮極也四章炰烋者怒氣之盛也斂怨以為徳者不以徳為徳而以怨為徳也人君不明其徳則慈祥豈弟之人逺而暴虐聚斂之人進無背莫為之後也無側莫侍其旁也無陪莫為之貳也無卿莫為之輔也無非實無也雖有之而不稱其職不任其事則亦若無人焉爾五章人君荒湛於酒則必信任小人於是而愆厥止則威儀之迷亂也於是而號且呼則言語之讙譁也窮日夜以娱樂棄國事而不恤所謂俾晝作夜靡明靡晦也六章如蟬之鳴言其無静黙之時也如羮之咈言其無清浄之處也小大近喪人尚乎由行言亂亡之證無間於小大也内於中國覃及鬼方言怨怒之極無間於逺邇也七章殷不用舊言既不用乎舊人又不用乎舊政也何謂舊人老成是也何謂舊政典刑是也老成之不用則無所咨訪典刑之不用則無所持守此大命之所以傾覆而不可救也八章上章言暴虐聚斂之是用老成典刑之是棄皆自絶其根本之謂也桀以是亡於前而殷受之為殷王者可以鑒矣而紂不知鑒也紂以是亡於後而周受之為周王者可以鑒矣而厲王又不知鑒也此亂亡之所以相繼也可勝歎哉抑首章愚人之所以益愚者以其有稟賦之偏而又無學問之力也哲人之所以不愚者以其所禀既異於人而又有省察克治之功也今而曰靡哲不愚曰亦維斯戾則是既不能省察於機微之際復不能克治於形著之後其為反常也大矣二童人君必大其謀而後可以定其命必逺其圖而後可以時其告謨之訏猶之逺此自綱領上説所以立一代之規模者也命之定告之辰此自號令上説所以為一時之政事者也此戒其加於人者不可不審諸己也敬慎者戒懼之存乎中威儀者輝光之著乎外威而能敬儀而能慎則容止必可觀進退必可度而斯民無不畏而愛之則而象之此勉其修於己者必有以示於人也上四句葢泛言之下四句則以其切近者言之也三章迷亂於政謂施於事者眩惑而無統也顛覆厥徳謂見於行者顛倒而不常也所以然者以其荒湛於酒故也汝獨不念汝所承之緒乎則當廣求先王所行之道以共其明法可也四章夙興夜寐修身之事也洒埽庭内齊家之事也身者民之主家者國之則身修而家齊是豈不足以為民之章乎車馬所以安身也固不可以不修弓矢戎兵所以禦患也尤不可以不戒在我者既不至於妄動則在彼者亦不敢以輕侮此又治國之要也詳於内而亦不遺於外謹於大而亦不忽乎細地有逺近之不同而慮之無不周事有常變之不同而備之無不飭此所以為訏謨定命逺猶辰告之實也歟五章質爾人民即所謂寝興洒埽維民之章也謹爾侯度即所謂車馬之修戎兵之戒也用戒不虞即所謂用戒戎作用逷蠻方也慎爾出話則欲其謹於言也敬爾威儀則欲其謹於行也白圭之玷以下又以見欲謹於行者必先謹於言也六章言之不可輕也以舌之不可捫也言之不可苟也以其易致差失也不可放也且天下之理孰有言而不讎者乎孰有徳而不報者乎朋友輔我者也庶民則傚我者也小子師法我者也而皆有以順之則子孫繩繩謂後有以繼乎前也萬民靡不承謂下有以承乎上也此皆謹言之效也七章輯柔爾顔以下言修飭於顯明之處也相在爾室以下言戒懼於幽隠之時也神之格思以下又言神之體物而不遺也夫惟神之體物而不遺此所以雖人所不暏不聞之處尤當戒謹恐懼而不可忽也不動而敬不言而信此自君子之戒懼言之也微之顯誠之不可掩此自鬼神之體物言之也至此則不特無愧於人亦且無愧於天矣八章言爾為人君之徳當使無一事之不善無一事之不嘉容止之不可以不慎威儀之不可以不謹不僭則於事無所差不賊則於理無所害夫如是鮮不為民之則矣投桃報李言理之必有者以勉之也彼童而角言理之必無者以戒之也夫昧之以理之所無者将以潰亂汝也而豈可以莫之察乎九章荏染柔木則可以緡之絲矣此温温恭人則亦可以為徳之基矣基者為學之所由以立温恭者亦徳之所以成也彼明哲之人告之以善言則順而行之此愚昧之人告之以善言則反謂我為不信人心之不同如此吁可嘆哉桑柔首章桑之盛也其根本未蠧其枝葉未壊而蠶者采之忽焉而盡以比周之盛也其典章未廢其法度未改而厲王敗之忽焉而亡君子不幸而遇此安得而不憂憂之之甚而至於病又安得而不號天以訴之乎二章車馬之盛旌旗之美一也而在正雅則為美在變雅則為怨者亦由聞鐘鼔管籥之音其欣欣喜色而相告者以其君能與民同樂也其疾首蹙頞而相告者以其君不能與民同樂也身之所遇有勞逸之殊而心之所感有悲喜之異然則為人君者其可不以絜矩為心而與民同好惡也三章無争者君子之所以已亂好争者小人之所以生亂亂階之既成則其禍之所及者逺矣此天之所以怒國之所以危而我之所以居無所定徂無所往無所適而可也五章告爾憂恤欲其及諸己也誨爾序爵欲其用夫賢也不能憂其所當憂則是悔悟之未萌無以為致治之本矣不能用其所當用則是賢否之不辨無以為致治之資矣誰能執熱逝不以濯賢者之能已亂猶水之能滌熱也其何能淑載胥及溺不用賢以已亂猶不用人以極溺也六章君子之在世惟出與處而已世治而行其道則禄食為無愧世亂而守其志則稼穡為無憾夫以稼穡而視禄食其勞逸固有間矣而惟君子之心視之如一故曰稼穡維寳代食維好稼穡之所以為寳者可資之以養吾生也代食之所以為好者謂可因之以全吾志也七章上章言稼穡以代禄食則朝廷雖不可以留田野猶可得而處也不曰以下闕十六章職競用力指暴虐之臣言之也職盜為冦指聚斂之臣言之也上有反覆之臣則民亦貪亂而不已矣上有暴虐之臣則民亦邪僻以相尚矣上有聚斂之臣則民亦怨咨而不定矣涼曰不可者外為正直之言覆背善詈者隂為險詐之行然亦孰得而掩之哉此我之所以既作爾歌也雲漢首章王曰於乎何辜今之人此哀矜惻怛不能自己之誠所以消災弭禍之本也靡神不舉言於神無不求也靡愛斯牡言於牲無所愛也圭璧既卒天以蒼璧地以黄琮四方各以其色之玉言羣祀徧舉而於玉無所吝也而何為其莫我聴乎二章藴則其氣之方蓄而未散也隆則其氣之方盛而未衰也禋祀之相繼而不殄將以弭其災也郊焉而祭天地廟焉而祭祖考既靡神之不宗矣莫親於后稷而何為其不克也莫尊於上帝而何為其不臨也耗則財之消而趨於盡斁則勢之敗而幾於危此其為下土之禍也甚矣何以當我之身而有是災乎三章競業言其心之危懼也如霆如雷言其勢之可畏也靡有孑遺則其民之不可保也不我遺則其身之不可保也先祖于摧則其宗社之不可保也四章靡瞻無所依也靡顧無所望也所以無可望者為羣公先正而不我助也所以無可仰者為父母先祖之忍予也五章羣公先正上章言其不助則不肯用其力也此章言其不我聞則不肯聴其言也父母先祖親也故其望之也切昊天上帝尊也故其畏之也深望之切故不無怨慕之情畏之深故雖欲逃遁而不敢八章始言有嘒其星歎其雨之不可必終言曷恵其寧幸其雨之或可必上言大命近止靡瞻靡顧求其助於神此言大命近止無棄爾成盡其責於己惟其責之在己者不可以不盡故當益求所以昭假者而修之凡若此者非以為一人也固以定衆志也余讀是詩見宣王有事天之敬有事神之誠有恤民之仁敬畏以事天而天監之䖍恭以事神而神享之惻怛以恤民而民懐之藴隆之氣消豐穰之效著内治既修外攘斯舉南征北伐無不如意中興之業視文武成康而無愧皆自雲漢一念之烈而基之也崧高首章四嶽之佐唐虞不惟總方嶽之諸侯抑且奉嶽神之祭祀則其有功於神人大矣故嶽神享之愈久而不替其在於周則其神靈和氣之所鍾既生甫侯於前復生申伯於後甫侯之生有以佐穆王於耄期之時申伯之生有以佐宣王於中興之日甫侯之訓刑申伯之畨畨要皆足以為周之楨幹四國其有不賴之而屏蔽者乎四方之人其有不賴之而宣布天子之徳澤者乎二章申伯以元舅之親世徳之懿而即封於謝冝也召伯王朝之大臣乃以身任版築之責而不以為勞何也葢大封之禮召公實世掌之則其上承天子之命下慰羣黎之心亦其責之不得辭也申伯之宅既定則不惟一世之安而申伯之子孫亦得以世執其功矣三章徹土田王者之大法故以命之大臣遷私人王者之私恩故以命之傅御土田徹而國制定私人遷而家道成則王之所以待申伯者厚矣六章信邁誠歸言其行之決而不疑也式遄其行言其行之速而無留也徹土疆所以定經制峙餱糧所以廣儲蓄定經制者所以為他日悠久之計廣儲蓄者又所以為今日經營之計也七章畨畨者言其才徳之武勇嘽嘽者言其儀衛之衆盛才徳之武勇固足為國之幹儀衛之衆盛亦所以為國之光豈不顯哉此申伯乎以親則天子之元舅以賢則百辟之是法則其位望之隆重而名譽之彰著亦可想矣烝民首章天監有周謂上天之明命有以視於下也昭假于下謂宣王之明徳有以格于天也惟天子有昭明之徳故上天有保佑之命惟上天有保佑之命故賢佐鍾粹美之徳則其天性之本善者雖賢愚之所同而其氣禀之獨厚者乃賢哲之所以異於人也二章今儀今色者輝光之著於外小心冀翼者嚴敬之存乎中古訓是式者學問以致其知威儀是力者進修以力於行四者體之所以立也天子是若明命使賦則用之所以行也惟其為用之所以行所以亦可謂之徳也三章式百辟而侯國有所法保王躬而君徳頼以成司政本而王命有所寄此皆自其已然者言之也至於賦政於外則正指築城于齊之事而言之也四方爰發兼以其效言之則所以期望之者至矣四章此肅肅然齊之命惟仲山甫為能将而行之邦國之有臧有否亦惟仲山甫能明之明哲保身者周身之智夙夜匪懈者事君之忠惟其有保身之智所以能明邦國惟其有事君之忠所以能将王命未有不能保身而可以事君者也未有不能事君而可以治民者也此明哲保身所以為事君治人之本也五章常人之情因物有遷而惟君子之守則不以物情之異而或變上章言仲山甫明哲保身明者明於理體之所以立也哲者察於事用之所以行也既能明於理又能察於事則其賦政於外也亦惟視事理之可否何如耳柔者豈得而茹剛者豈得而吐哉惟不茹柔故不侮鰥寡則可以恵鮮之固所以行吾仁也惟不吐剛故不畏强禦則可以遏絶之亦所以示吾勇也然則山甫之保身豈枉道徇人之謂哉六章儀度圖謀而後言者所以為知徳之至愛而恨其不能助者所以為好徳之深斯徳也何徳也固人所同得也然得之於天者衆人之所同而舉之於己者仲山甫之所獨何以見其獨也人莫不有是儀色也而仲山甫獨能令焉人莫不有是心也而仲山甫獨能翼翼其敬焉人孰無古訓也而仲山甫則是式焉人孰無威儀也而仲山甫則是力焉此即其舉徳之實也觀鮮克舉之之詞衆人惟致其不足於人觀愛莫助之之詞詩人惟致其不足於己則山甫之舉徳固可謂賢而詩人之知徳好徳亦可謂賢矣舉己之徳者所以立本補君之闕者所以致用即上章所謂能保身而後能事君者也韓奕首章受命者臣事君之忠親命者君待臣之厚纉戎祖考欲其無愧於親也無廢朕命欲其無愧於君也夙夜匪懈勉之以勸也䖍恭爾位戒之以敬也朕命不易示之以信也幹不庭方以佐戎辟又欲其有以敵王之愾也六章彼韓城之廣而大者乃召伯康公之所營也昔先祖之受命既因百蠻以為之長今韓侯之受命復因追貊以為之伯則其城池之不可以不修田畝之不可以不治税法之不可以不正土物之不可以不貢皆修其職業之謂所以終首章之意也江漢二章經營者召虎之職告成者召虎之功有召虎之經營故四方得以既平有召虎之告成故王國得以庶定四方之既平時靡有爭矣王國之庶定則王心載寧矣天下之所以未平者以争心之未息而争心之所以未息者以王化之未孚也彼見利則奪見便則乗者固夷狄之常情而轉逆以為順轉危而為安者乃王者之盛心故必使天下無有争心而後大臣之功成而王者之心亦安矣三章封建井田二者皆先王之良法中興之所當復也故江漢既平宣王即命召虎闢四方之侵地將以復封建之舊也徹四方之疆土将以復井田之舊也復封建之舊所以息四方之争而固小國之利也復井田之舊所以戢四國之暴而固小民之利也凡若此者非以病之也非以急之也惟欲其取正於王國而已於是而疆之所以畫其大界也於是而理之所以别其條理也疆之理之盡南海而止則雖海濵之國無不復乎舊封也濵海之民無不安於什一也此所以為中興之盛也四章昔先王受命有如召公日辟國百里則召公者實文武之楨幹也我之命爾以來句來宣也豈惟一人之為亦惟先人之功業是繼果能以繼先人之業為心則淮夷之未服豈惟虎之責抑亦虎之恥也汝能聞敏汝功則我固當錫汝以祉福矣勉之以先人之業期之以後日之報宣王真得待世臣之體也哉五章釐爾圭瓉秬鬯一鹵所以厚其禮也告于文人錫山土田所以廣其封也于周受命自召祖命君臣相期望於無窮也宣王之意若曰我之祖有若文王焉則創業之聖君也爾之祖有若康公焉則佐命之元臣也此其同心同徳為可知也今我之伐淮夷非以黷武也将以復先王之境土也爾之受命而往非以邀功也将以嗣先人之功業也然則爾之告成非特無愧於爾祖固亦無愧於先王也我之報功非特無愧於先王也固亦無愧於爾祖也昔也爾祖既於此乎受命則功非爾之功即爾祖之功也賞非吾之賞即先王之賞也且佐命之臣固有於此乎受命者矣而其子孫未必能繼之於今日也中興之臣固有於我乎受賞者矣而其先祖未必能開之於昔日也則是自先王創造以來祖孫相繼而受命於兹者惟爾而已此所以為寵異之至也若虎之受賜則如之何亦惟曰虎拜稽首以致其敬天子萬年以致其祝而已六章上四句為祝頌之詞下四句乃勸勉之語祝頌者所以荅君之賜勸勉者所以進君於道夫淮夷之服王則有令聞矣然猶願其令聞之不已焉四方之平王則有武功矣然猶願其文徳之治焉武功可以撥禍亂於一時文徳可以致太平於悠久則武功者誠非聖人之得已而文徳者誠今日之急務也若召穆公可謂愛君之至矣常武首章赫赫言其聲勢之盛明明言其威靈之顯此中興之氣象也王之所命者以正官則卿士以兼官則大師言其世則南仲以為祖言其人則皇父以為字是當時之大将也是時天子親征故親命皇父以整六師謂統其士衆也以修我戎謂備其器械也軍事以敬戒為主敬則無一念之或怠戒則無一事之敢忽即南仲所謂憂心悄悄也爾祖南仲既以敬戒而服玁狁平昆夷於前矣爾其可不以敬戒而恵此南國於後乎二章宣王嘗命吉甫北伐矣又嘗命方叔南征矣獨於淮夷之叛則赫赫自将何也葢淮夷徐戎近居中國中國之土地則先王之土地也而夷狄侵之中國之人民則先王之人民也而夷狄暴之果安得不以吾之仁伐彼之不仁以吾之義討彼之不義也赫赫業業言其威靈之顯威也匪紹匪游言其師行之節制也如雷如霆言其聲勢之磅礴也用兵之法攻心為上徐方繹騷徐方震驚雖未即順從而已先服其心矣四章震天之怒也怒人之怒也虓虎之怒也王之武則如震而如怒士之武則闞焉而如虎於以進師於淮浦鋪則其衆之偏也敦則其陣之厚也仍執則其力之勇也此淮浦之地所以截然而不可犯者以其為王師之所也總論首章言敬戒卒章言允塞葢不言敬戒無以見軍律之嚴不言允塞無以見王道之大惟其軍律之嚴所以戰而必勝惟其王道之大所以不戰而自服也服而來來而同人以為天子之功也而不知宣王初未嘗以兵力服之也終而曰不回則王道之大信有以服其心矣宣王於此夫何為哉可以班師振旅而歸矣斯時也其即武王戢干戈而􅐤弓矢求懿徳而肆時夏之時乎故曰因以為戒者戒其武功之不可黷而勉其文徳之不可以不修也瞻卬首章昊天者民之所瞻仰也而曷為其不我恵乎既使我甚久而不寧矣而又降此大厲焉國無有定則民之受其病也甚矣小人之害民猶良苖之瘁於蟊賊也則亂将何時而已乎刑罪之網民若鳥獸之罹於羅網也則病将何時而瘳乎三章哲夫成城言其智謀之可以立國也哲婦傾城則其知辨徒足以亡人之國而已故哲婦之懿美也而反為鴟鴞之惡以其多言而為禍亂之階梯也然則亂豈真自天而降哉夏之亡也以妲己周之亡也以襃姒葢皆出於婦人而已然言之多而非有教誨之益者又非特婦人而已也雖奄寺亦然葢有嬖妾以蠱惑於内必有奄寺以煽亂於外奄寺非嬖妾無以為之主嬖妾非奄寺無以為之輔二者實相倚以為奸其可以莫之察乎四章鞫人者恃其智辨以屈服人也忮者殘害之意存於中也忒者變詐之態著於外也譛始者始為不信之端竟背者終無可騐之實豈曰不極者人以為罔極而彼則不自知其放恣也伊胡為慝者人以為慝惡而彼則猶以為無害也皇皇求財利者小人之事皇皇求仁義者君子之事君子而識三倍之利則其為慝也甚矣謀謨於廟堂者君子之事蠶織於宫庭者婦人之職婦人而與朝廷之政則其為慝也愈甚矣五章天之所以責王者以其信用婦人也神之所以不富王者亦以其信用婦人也内惟褒氏之聴則外必有犬戎之變葢隂慝之招也舍爾介狄者不憂其所當憂惟予胥忌者反忌其所不當忌不弔不祥不畏于天也威儀不類不敬其身也人之云亡不求善人以為之輔也不畏於天此天之所以刺也不敬其身不用夫善此神之所以刺也若是則邦國之殄瘁也宜哉七章泉之上出而不已則其源也深矣心之隠憂而不已則其來也亦非一日矣葢天降禍亂而已之生也適于是時則亦如之何哉抑天雖高遠而其轉危以為安轉亂以為治亦惟天為能耳苟天意之所與亦無不能鞏固之者幽王誠能翻然悔悟改其前日之行以求無忝於厥祖則民心之所與即天意之所與庶幾禍亂可救而子孫亦䝉其福矣召旻首章旻天疾威言其暴虐之甚也天篤降喪言其喪亂之多也國之将亡必先之以災異而重之以飢饉飢饉荐臻則民無不流亡内而中國外而邉境将悉為荒虛而不可救矣二章惟天降刑罪以罔罟斯民故使蟊賊之人用則其内亂也至矣使昬椓之人用則其不恭也甚矣夫潰亂邪僻之人不平其心而亂人邦國者也乃使之任治平之責則其致亂也宜哉三章臯臯訿訿小人之頑慢詆毁者也而王則愛而不知其惡兢兢業業在位之戒謹恐懼者也而王則憎而不知其善不知其惡則其惡日長矣不知其善則其位孔貶矣其顛倒錯亂如此欲國無危得乎四章嵗之旱則草之生於谷中者且不能以遂長沉其栖於木上者安得而不枯槁乎國之亂則民優於財用者且不能以自給況其窮而無告者安得而不流亡乎是以我相此邦無不潰亂者也六章池之竭由外之不入亦猶國之亂由外無忠賢以為之輔也泉之竭由内之不出亦猶國之亂由内無仁義以為之本也此害之所以益廣憂之所以益大而惟恐災禍之并及於我躬也末章大雅終於召旻何也曰幽王無道嬖妾蠱惑於内小人用事於外天變於上而不知民怨於下而不悟周室将亡不可救矣君子傷之曰必有君如文武有臣如召公則周室其可復興乎是時去宣王中興未逺亦豈無舊臣可任者如王之不用何此所以終於亡也總論厲王無道而宣王中興以宣王之有志也幽王無道而平王不復中興以平王之無志也噫此雅之所以亡而黍離之所以降於國風也
