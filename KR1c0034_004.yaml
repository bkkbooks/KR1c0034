body:
  text: 詩解頤卷四明朱善撰頌四周頌清廟於穆哉此清靜之廟所以祀文王也文王遠矣不可得而見矣而入清廟者皆如復見於文王何也不曰文王之徳肅肅其敬雝雝其和乎今助我而祭文王者尊之而為公侯則肅雝顯相而肅雝即文徳之謂也卑之而為多士則秉文之徳而文徳即肅雝之謂也文王之神雖在天而文王之主則在廟對越其在天之神即所以事其在廟之主也駿奔走其在廟之主即所以事其在天之神也主之在廟者一於廟而已而神之在天者則固無不之也無不在也以為在彼而或在於此以為在此而或在於彼其於昭于天則豈不顯乎其使人齊明盛服以承祭祀洋洋乎如在其上如在其左右則豈不承乎惟其不顯不承此所以不可得而厭射也不可度思矧可射思此自其平居之時言之也不顯不承無射於人此自其祭祀之時言之也神之無在無不在雖平居之時且不可得而厭也况文王之神與天同體而謂祭祀之時可得而厭射乎維天之命天道不已文王純於天道亦不已惟其徳之不已故其福澤之及於後人者亦不已凡神之所以恤我我之所以受之者皆其徳之不已者為之也我既有以受之則必有以順之順之而不違則已既與文王一矣後人又篤厚之而不忘則後人又與己為一矣曰駿惠曰篤皆自其不已者而推言之也烈文烈文美其徳也錫福美其功也無封靡所以致其戒也崇之皇之所以厚其報也諸侯助祭而有以及王者之子孫王者報功而有以及諸侯之後嗣此所以為忠厚之至也莫彊於人能盡人道則四方其訓之矣莫顯於徳能顯明其徳則百辟其刑之矣道者天下所其由徳者人心之所同得千萬人同此心此理也故施諸當世而人心無不服千萬世亦同此心此理也故傳諸後世而人心不能忘先王既以此道徳而感人心則後人當以此道徳而事先王使助祭之諸侯而皆惟先王之是法則人道無不盡徳行無不顯而國内之民莫不是訓而是從矣其子孫豈不能與王者之子孫相保守於無窮乎上言子孫保之繼序皇之故此言道徳乃告以所以致此之由也天作彼髙者山天實作之也然天能作之而不能有以治之所以荒而治之者實有待於大王焉大王能作之而不能安之所以安而定之者尤必有待於文王焉夫惟大王創造於前文王安定於後是以昔焉之險阻今焉之平易則以哲王之相繼而人之歸附者衆也我子孫是以得奉其祭祀於此則繼今以往世世相承其可不思所以保守而勿失乎昊天有成命不敢康以心言宥密以徳言宥者𢎞深密者靜密𢎞則不可量深則不可測靜則不可撓密則不可閒其徳之𢎞深而靜密固非一日之積也惟其積累於下而君徳益以隆是以承藉於上而天命益以固以不敢康寧之心成𢎞深靜密之徳以𢎞深靜密之徳成繼續光明之業則所以基上天之命者在是所以繼先王之業者在是而皆不外乎此心故又以單厥心終焉我今日所以能安靜天下而保其所受之命者是又成王之賜也噫昊天有成命而文武受之於前成王能基命而子孫保之於後則周之王業其有窮乎我將將曰我將則所以將而奉之者必躬必親也享曰我享則所以享而獻之者必敬必戒也羊曰維羊謂於羊之外不敢有加禮也牛曰維牛謂於牛之外不敢有加物也此貴誠之義也而不知天之果降而在此之右乎不敢必也承上文而言雖不敢必於天而實可必於文王文王之典安靖天下之典也我惟當於文王之典是以為儀是以為式且是以為刑焉以是典也而日安靖乎四方則所以感格之者有其素矣今而將是羊也獻是牛也此能錫福之文王豈不降而右享我乎其者辭之疑既者辭之決所以疑者尊之而不敢必也所以決者親之而或可必也畏者戒懼之誠保者奉持之意畏天之威即所以畏文王之威也保天之命即所以保文王之命也時邁實右序有周所以見天眷之隆也惟天眷之隆故使之治人而人無不治使之事神而神無不懷益有以見其盡君道之可信明昭有周所以見王道之大也惟王道之大故慶讓黜陟而刑賞行偃武修文而好尚定益有以見其保天命之可信思文粒我者雖稷之功而貽我者實帝之命惟其命之出於帝是以其功之可以配乎天也然稷之功養民而已而乃以為陳常時夏則是果嘗教民而侵契之職也邪葢因其飲食聚㑹而制為燕饗之禮以通上下之情制為祭祀之禮以盡孝誠之感制為冠昬之禮以明隂陽配合之義以明長㓜嗣續之節至於日用常食之間尤必老者先而少者後老者豐而少者儉老者甘美而少者麤惡則是人倫之所以厚固本於飲食之豐而飲食之所以豐實本於后稷之教夫如是則陳常時夏之功稷亦豈得而辭哉臣工此詩兩言嗟嗟嗟嗟臣工謂凡百官之事皆不可以不敬也嗟嗟保介謂爾農官之事尤不可以不敬也先王之於百官皆有成法以賜之有官守者固當來咨來度也况我周家以農事開國其法尤為詳備爾農官其可不來咨而來度乎孟春躬耕常籍此正咨度之時也於是戒之曰時至於暮春則當治其新畬矣爾毋謂其田之難治其效之難見也况來牟將熟既可以受明賜於已然即來牟以為嘉榖之占又可以徯豐年於後日爾農官固不可不致其勸相之勤而為甸徒者亦不可不致其耕治之力也當知錢鏄之用雖在於春暮之時而銍艾之收已在於孟秋之際特奄忽間耳豈可以為久而難待哉言豐穫之必然以勸勉之也噫嘻此詩舉成王之謚則成王以後之詩也成王既置田官而戒命之後王復遵其法而重戒之率時農夫農官之職也播厥百榖農夫之事也終三十里欲其地之無遺利也十千維耦欲其人之無遺力也地無遺利人無遺力此豐穰之所以可必也豐年收入之多而祭禮之無不備祭禮之備而福禄之無不徧此方社之賜也而亦田祖先農之力也秋而報焉則方社之謂也冬而報焉則蜡祭百神之謂也以其同謂之報祭故同歌是詩也有瞽重言有瞽見其非一人也而皆在於周之庭矣上言設下言奏皆兼應田縣鼓鞉磬柷敔而言設之者有其人謂眂瞭也奏之者有其人即瞽師也簫管獨言於其下者以其為器之小而無所事乎設也簫管備舉則樂器之無不舉可知矣喤喤者言其聲之大而和也和鳴者言其聲之小而和也肅雝者言其人之和而敬是以其聲之亦無不和而敬也先祖是聴幽有以感乎神也我客戾止永觀厥成明有以感乎人也獨言嘉客者尊之也雝來而雝雝至而肅肅此諸侯助祭之容也薦其廣牡相其肆祀此諸侯助祭之職也相維辟公天子穆穆謂諸侯助祭而天子得以遂其深遠之容也假哉皇考綏予孝子謂諸侯助祭而皇考有以安我孝子之心也莫彊於人也而文王之宣通哲知則有以盡人之道莫顯於徳也而文王之允文允武則有以備君之徳其道徳之效下有以安乎人上有以及乎天遠有以昌厥後則文王之所被者廣矣故能安我以眉壽介我以繁祉使我得以享右乎烈考文母愈久而不替則即綏予孝子之實也即克昌厥後之實也載見諸侯之來朝將以稟受法度也而我乃率之以祀武王何也葢先王者法度之所從出而宗廟者又禮法之所由施也諸侯之助祭於此也夫獨無所感乎先王之神洋洋乎在上孝子之誠穆穆乎在下昭穆之各以其位而外之各以其官長㓜之各從其事貴賤之各守其職裸獻之有其禮和平之有其樂將享之有其物酬酢之有其儀凜乎其不可踰秩乎其不可紊則所謂法度即此而在矣奚必他求哉故章末但美其助祭之功而不及乎戒飭之事者豈非以率見之際所以教示之者已深而無所事於戒飭也歟武武王之功所以天下莫彊者以文王開之於前而武王受之於後也於文曰允文則其開於前者初非不足於武也於武王曰無競則其受於後者亦非以力取之也於勝殷以見其伐暴之義於遏劉以見其止殺之仁仁義之師王者之師也此大功之所由定而大業之所由成也閔予小子未免喪以前居梁闇之時也惟思慕而已既免喪以後臨朝廷之時也則有家國天下之責焉皇考之達孝不可無以繼之也皇王之大業不可無以承之也然所以繼皇考之孝固不外乎敬所以繼皇王之業亦不外乎敬而已孝也敬也一理也自繼述而言謂之孝自存主而言謂之敬敬其身即所以孝於親孝於親未有不敬其身者也此所以能就文武之業而崇大化之本也訪落居梁闇之時未可以言也既免喪以後可以言矣可以言而不言則無以見求助之意無以見繼述之志訪予落止求助之誠也率時昭考繼述之孝也於乎悠哉歎其逺也繼猶判渙歎其難也然豈可畏其逺而不進畏其難而不勉哉惟當繼其上下於庭者欲其無一時之不敬也繼其陟降於家者欲其無一事之不敬也庶幾賴皇考之休有以保其身焉則無危亡之患也有以明其身焉則無昬昩之患也敬之敬者戒懼慎獨之事所以誠身也明者學問講習之事所以明善也羣臣以敬而進戒欲成王之誠之也成王以明而自勉謂必先有以明之而後可以誠之也既有以致其明之之功復有以致其誠之之力則聖賢之事業可以馴致矣而又曰佛時仔肩示我顯徳行則欲其教示之無己也若成王者可謂能受諫者矣載芟墾闢之時芟以除其草柞以除其木然後耕之則其土氣蒸達釋釋然解散矣專言新墾之田者以其用力尤難故也千耦其耘徂隰徂畛言耕夫徧野無曠土也侯主侯伯侯亞侯旅侯彊侯以言衆力競勸無㳺民也思媚其婦有依其士言其家道和平無乖戾也有畧其耜言其器之利也俶載南畝播厥百榖言其事之時也實函斯活言其苖之初生也驛驛其達有厭其傑言其苖之既長也緜緜其麃言耘者之詳而密也載穫濟濟言穫者之衆而整也有實其積萬億及秭言其積之富也烝畀祖妣以洽百禮言其用之廣也有飶其香有椒其馨皆酒醴芬芳之氣也宴享賔客所以致敬也而邦家以之光顯供養耆老所以致愛也而胡考以之安寧匪且有且則豐穰之慶非止於一處也匪今斯今則豐穰之慶非止於一日也葢自極古而已然則自后稷耕稼而至於今其所從來者逺矣良耜自有人民而有稼穡自有稼穡而有祭祀春而祈焉秋而報焉皆人情之所不能已也載芟良耜皆言春而致其耕種之勤夏而極其耘耨之勞秋而穫夫收成之富男盡力於外女盡力於内使我得宴享以致其敬祭祀以致其孝者是果誰之賜哉以為田祖先農之功而固有方社也以為方社之功而固有田祖先農也此所以不得不並致其祭報也絲衣絲衣其紑言其潔齊也載弁俅俅言其恭順也自堂徂基自内而之外也自羊徂牛自小而之大也鼐鼎及鼒自大而之小也告濯告潔見其器之整飭也告充及其牲之肥碩也比未祭以前事兕觥其觩㫖酒思柔則既祭以後事夫祭畢以燕而兕觥罰爵觥然上曲徒設而不用既不吳而失之讙譁則其敬靜為何如也復不敖而失之倨慢則其謹飭為何如也宜其得壽考之福也酌時之未可聖人不先時而有為時之既可聖人不後時而不為夫聖人亦何心哉惟視夫時之可與未可耳方其遵養時晦聖人非忘天下也及其是用大介聖人非利天下也聖人無忘天下之心亦無利天下之心此所以為聖人之武也後人受武王之功則當嗣武王之業嗣武王之業則當法武王之事果能法武王之所以治天下者而治天下則天下又豈不以其事武王者而事我後之人哉桓武王之綏萬邦所謂一戎衣而天下定也其屢穫豐年之祥則以人心和於下天時應於上也所以然者由上天有匪解之命故武王有桓桓之徳由武王有桓桓之徳故多士有濟濟之盛而武王之於多士不惟保而有之尤必任而用之不惟用之於朝廷尤必用之於四方葢天子以天下為家者也必有以安定乎四方而後有以克定乎厥家此其徳所以上昭於天而遂君天下以代商也詩言於昭于天者二大雅所謂於昭以文王之神言也此所謂於昭以武王之徳言也惟文王之神昭於天也故周有維新之命惟武王之徳昭於天也故周有代商之命其實武王之徳即文王之徳而武王之命即文王之命也賚文王之勤勞於前固以遺我後之人也則子孫受之於後者亦豈敢以自専哉且後人之所當尋繹而思念者文王之徳也而文王之徳所以能使人尋繹而思念者以有諸臣之功也知文徳之不可忘則知功臣之不可忘矣於是布此文王功徳之在人而可繹思者以賚有功使各建都邑於禹所治之地新與舊之相間親與疎之相錯小與大之相承遠與邇之相聯使天下之勢如身之使臂臂之使指莫不順從而無不安其分之意則其大封功臣固所以求天下之安定也凡若此者葢皆有周之命非復商之舊矣於是復歎美之使功臣之受封賞者無不繹思文王之徳而不忘焉上言敷時繹思將以布其可繹思者於人也此言於繹思欲其存此可繹思者於己也敷時繹思固所以求天下之安定而於繹思則又欲其共保安定於悠久也魯頌駉言駉則每章同詞見其充實之如一也言有則每章異詞見其名色之不一也言坰亦每章同詞見其地有常所官有常職初不病民居而妨民田也於車曰彭彭言其盛也伾伾則盛而有力繹繹則盛而不絶袪袪則盛而彊徤皆自夫彭彭而推言之也於馬曰斯臧言其善也斯才則材之良而非駑斯作則氣之盛而方壮斯徂則力之徤而致逺皆自夫斯臧而推言之也於思曰無疆言其立心之逺也無斯則逺之無窮無斁則逺之不已無邪則逺而能正皆自夫無疆而推言之也然則夫子何以獨有取於無邪之一語曰自詩人之意言之則魯侯牧馬之盛由其立心之遠故以無疆為先自聖人之意言之則君子修身以道由其立心之正故以無邪為切果能無一事而不思無一思而不正則為子而思孝為臣而思忠為學而思所以為賢為聖将無所施而不可奚獨牧馬一事而已哉噫聖人教人之意可謂深切而著明矣學者誠不可以不勉也有駜有駜有駜則其駜然而肥彊者乃乘黃之馬也夙夜在公則其在公而飲酒者乃辯治之人也謂之辯治則既不失之諠譁亦不失之怠放其不至於亂也審矣皷即所謂坎坎皷我也舞即所謂蹲蹲舞我也當國家閒暇之時而君臣同享乎和平之福則其樂可知也自今以始嵗其有樂之在外者也君子有榖詒孫子樂之在内者也樂之在外者不可以必得以其屬諸天也樂之在内者斯可以力致以其屬諸己也詩人頌禱其君既欲其豐穰之有以繼乎古復欲其大善之有以傳厥後則人君之可樂孰有大於此者哉泮水首章至三章國之有學固所以為淑人心之地而賢君之視學又所以為感人心之機此詩美魯侯在泮而篇首三章皆深寓其意於樂之一詞一章樂其來而至二章樂其至而教二章樂其教畢而又燕來而至則其儀足以感人而國人之見之者無不樂至而教則其言足以感人而學士之聞之者無不樂教畢而燕則其禮足以優賢而羣賢之與燕者無不樂國人樂而民俗之丕變學士樂而學業之益進賢者樂則又將樂告以善道而内治之益修逺人之自服斯所以為頌禱之意歟四章敬明其徳徳之存於中者無不敬也敬慎威儀儀之著於外者無不敬也合内外而無不敬此所以為民之法也允文允武欲其君徳之備也靡有不孝欲其子道之盡也惟其文武之備故有以昭格乎烈祖惟其靡有不孝故有以自求乎多福孝也敬也文武也其實一理也五章克明其徳所以淑其身也既作泮宮所以淑諸人也既有以淑其身又有以淑諸人則不期於逺人之服而逺人自無不服矣如是而猶有不服者則命虎臣以伐之而又願其於此乎獻馘於此乎獻囚且欲其訊問之審無愧於古人焉則逺人之不服者鮮矣六章徂兹淮夷徐戎並興見於費誓之書則淮夷之為魯患自伯禽受封之時而已然矣故詩人頌禱其君必至於逖彼東南而後可以無愧於烈祖伯禽焉烝烝皇皇言盛也即三郊三遂之衆也不吴不揚言其肅也即所謂無譁聴命也不告于訩無爭訟也即所謂勿敢越逐無敢寇攘也夫如是則其在泮獻功宜也閟宮首章宮廟所以安神其侐然而清靜則深嚴而不褻也實實而鞏固則安重而不傾也枚枚而礱密則綢直而有序也此述其修閟宮之詞也其徳不囘言己徳之無疵也上帝是依言天命之攸眷也此后稷之所由以生也降之百福天降之也天以是福而降之稷稷以是福而敷之民則民之福即稷之福也此所以奄有乎一國也俾民稼穡稷使之也稷降是種以教乎民民賴是種以養其生則民之有皆稷之有也是即奄有此下土也禹以平水土為功稷以播百榖為功由水土之既平而後百榖之可播則稷之教稼穡固所以繼禹之緒也二章金履祥曰案詩稱大王實始翦商不過謂周家翦商之業自大王始基之爾而後世稱大王有翦商之志不惟誤認詩意其失大王本意甚矣且大王遷岐在小乙之世至丁巳而高宗立殷道中興者六十年厯祖庚祖甲祖甲二十八祀而生文王其時商未衰也大王亦安得有翦商之志哉况大王前日猶能棄國於狄人侵豳之時而今日乃欲取天下於商家未亂之日大王之心決不如此其悖也愚案金氏之説足以補朱子之所不及故著之三章皇皇后帝惟周王為得而祀之耳胡為乎魯之郊皇祖后稷亦惟周王為得祭之耳而胡為乎魯之廟魯之郊禘非禮也周公其衰矣然則魯之祀周公以天子之禮樂也周公之心果得以自安乎其心有所不安則其神有所不寧其神有所不寧則其福有所不降詩人於后帝后稷則曰降福既多既者辭之決也於周公皇祖則曰亦其福女其者辭之疑也我將宗祀文王於明堂以配上帝則敢必於文王而不敢必於天今魯人之頌僖公乃敢必於帝與稷而不敢必於周公皇祖何也噫帝與稷之可必非真可必也周公皇祖之不可必則原周公伯禽之心其心誠有所不安其神誠有所不寧而其福亦誠有所不可必也然則龍旂承祀六轡耳耳其儀非不盛也春秋匪解享祀不忒其誠非不至也享以騂犧是享是冝其禮非不隆也而獨於福之降與否則有所不敢必只亦其福女半辭之間而詩人不足之意已悠然見於言外矣可勝歎哉四章秋而載嘗夏而楅衡言其事之豫也白牡騂剛言其牲之備也犧尊將將言其器之飭也毛炰胾羹籩豆大房言諸物之備有也萬舞洋洋言衆樂之交奏也君之所以事神者極禮樂之盛則神之所以報君者極福壽之隆不虧如月之常盈而不缺也不崩如山之常峙而不䧟也不震不騰如地之常靜而不動也不特如山之高而已又欲其如山脊之岡不特如阜之大而已又欲其如大阜之陵則公之壽可以等岡陵而為三矣五章以車之數則千乘而車之所載必有弓與矛焉以人之數則三萬而人之所戴必有胄焉以是衆也而西伐戎北伐狄南伐荆舒孰得而禦之哉故又願其如此而且祝其昌大壽考焉六章泰山魯之望也龜䝉魯之有也以如是之土地如是之人民苟善用之則可以荒大東可以服海邦可以來淮夷皆祝願之辭也八章純蝦言其福之盛大眉壽言其福之悠久曰眉壽保魯則願其壽考而常享茲富貴也曰復周公之宇則又以土地人民受之先王傳之先君凡諸侯之所侵者皆欲其自今而復之也而魯人願望之心猶未已也閨門之内有令妻焉則願其常有以為之綱也有壽母焉則願其常有以為之子也朝廷之上有大夫庶士焉則願其常有以為之君也邦國之大有土地人民焉則願其當有以為之主也據天位之尊而樂之在外者無不備處天倫之常而樂之在内者無不有此所謂多受祉也多祉即純嘏之謂黃髪兒齒即眉壽之謂章末二句所以終首章二句之義也商頌那猗與歎其美也那與歎其多也置我鞉皷謂有人以設之也奏皷簡簡謂有人以奏之也奏之而聞其聲之簡簡則可以衎我之烈祖矣湯孫奏假綏我思成始焉人固因樂以致其感格之效也於赫湯孫穆穆厥聲終焉樂復因人而成其和敬之美也至於鏞皷之斁斁然而盛也萬舞之奕奕然有次序也則不特幽有以感乎神而嘉賓在位亦無不夷懌者矣獨言嘉客者尊之也古昔以世言先民以人言温恭朝夕敬之存於中者無一時之或息也執事有恪敬之見於外者無一事之或慢也聲樂之感通既如彼恭敬之奉持復如此則湯其尚顧我烝嘗哉此乃湯孫之所奉也則其拳拳思慕之意藹然見於言外亦可想矣烈祖成湯以盛徳而受天命凡商一代之福所以盛大而悠久者已基於烈祖受命之日矣故有秩秩無窮之福可以申錫於無疆爾者指其人而言所者指其處而言爾後人所以能入烈祖之廟以奉烈祖之祭者是即其福之所及也言此以起下文之意酒之清者方載而在樽則未獻之時也而烈祖之神已與我以所思而成之人言應之疾也至於羮定則薦熟之時也既戒既平誠意之寓於物也無言無爭誠意之存乎人也無言則肅敬之至無爭則齊一之至故烈祖之神復安我以眉壽黄耉之福焉溥將之命舉其福之全體言之也豐穰之慶舉其福之一事言之也由有溥將之命是以有豐穰之慶由有豐穰之慶是以有祭禮之備由有祭禮之備是以有福禄之報諸侯之助祭既有以致其假饗之誠天命之眷顧復有以致夫假饗之效則福禄之報其有窮乎𤣥鳥天命𤣥鳥降而生商推契之所以生固本於天命也古帝命武湯原湯之所以興亦本於天命也宅殷上芒芒言契之受天命而奄有乎一國也正域彼四方言湯之受天命而奄有乎天下也非有契以開之於前無以為有商受命之基非有湯以繼之於後無以成有商興王之業此詩人於契與湯所以必並致其尊美而無異辭也方命厥后奄有九有則諸侯之受命於商王者固非止於一國也商之先后受命不殆則商王之受命於天者亦非止於一世也夫惟其受命非止於一世而皆不危殆也故至於武丁孫子之世猶得以頼其福焉是何也以其武徳之相繼也昔者湯有武徳而武丁繼之其武徳無以異於湯也武丁有武徳而武丁孫子繼之其武徳無以異於武丁也夫惟武丁孫子襲湯號而有天下者其武無所不勝故諸侯莫不乘其車馬奉是黍稷以來助祭於商焉以見人心之同也人心之同本乎天命之隆天命之隆本乎君徳之盛此詩人所以反覆歎咏而歸之商王之武徳也王者之都雖不過千里而其封域則極乎四海之廣以見王化之行必自内而達之外也王者之地雖逺極於海隅而其來假則皆萃於輦轂之下以見人心之合必自外而向乎内也噫此殷之受命所以咸冝而皆有以負何乎百禄也長發首章有商受命之祥雖在於濬哲相繼之時而有商受命之基實定於有娀生商之日夫有娀之生商此何時也乃禹治洪水之時也是故其曰禹敷下土方則有以見其濬治之勞也其曰幅貟既長則有以見其疆理之大也以氣化則方盛以人事則方理於斯時也而有娀氏始大是固上帝之所眷也故立其女之子而造商室焉必言有娀者以契固商人之所由生而有娀又商人之所自出猶之稷固周人之所由生而有邰又周人之所自出也故詩人將言商之受命則不惟本之契又必推契之所以生而歸之有娀將言周之受命則不惟本之稷又必推稷之所以生而歸之姜嫄以其受命之基實在此也二章契為司徒敷五教言文徳則有之未見其武徳也而詩人以桓撥言之何也葢舜之命契也百姓不親者欲其治之而使親五品不遜者欲其治之而使遜是即撥亂以為治撥不正而反之正也此非有武徳而何能若是哉達者徳孚於人而行無不得之謂受小國大國亦非謂受小大諸侯之國也葢契始封於商後又徙封於殷始封之國小故先言受小國是達是徳孚於商土之民而政教之行於商土者無不窒礙也徙封之國大故後言受大國是達則又徳孚於殷土之民而政教之行於殷土者亦無所窒礙矣率履不越自己之躬行者言之所以為敷教之本也遂視既發自民之丕應者言之所以為敷教之效也是即受小國大國是達之實也𤣥王以桓撥而肇造於前相土以烈烈繼承於後則必其當方伯之任掌征伐之權故諸侯畏之截然整齊是亦天命之所不違也三章聖敬日躋修己之敬也上帝是祗事天之敬也惟其有修己之敬故能昭假于天久而不息惟其有事天之敬故帝又命之使式於九圍焉大明稱文王之徳曰小心翼翼即修己之敬也曰昭事上帝即事天之敬也曰聿懷多福即式於九圍也孔子曰修己以安百姓中庸曰君子篤恭而天下平皆此意也四章五章此承前章湯惟聖敬日躋而天命之使人為法於九州故能受小球大球小共大共言四方小大之國莫不恪共厥職以來朝於商也為下國綴旒者譬之於旗旗之旒必附於縿天下之諸侯必附於有徳也既為諸侯之所附則有以何天之休矣為下國駿厖者譬之於馬馬之任重必以力聖人任天下之重亦必以武徳也既能任天下之重則有以何天之寵矣不競不絿者彊與緩迭施初不偏於彊而亦不偏於緩也不剛不柔者剛與柔相濟初不偏於剛而亦不偏於柔也此所謂中道也故能敷政優優而百禄之是遒焉不震不動者有離之文明故處大變而不疑不戁不竦者有乾之剛健故臨大事而不懼此所謂武徳也故能敷奏其勇而百禄之是總焉敷政優優本上章聖敬而言敷奏其勇則又以為下章征伐張本也末章孟子曰五百年必有王者興其間必有名世者此詩前章言湯降不遲是湯之生不先不後而適當乎五百年之期乃天實立之以為興王之君也此章言降於卿士是尹之生亦不先不後而適當乎夏商革命之際乃天實賜之以為興王之佐也使生湯而不生尹則是有君無臣而何以成興王之業惟有湯以為之君而又有尹以為之佐此天命之所以集而王業之所以成也孟子又言湯之於伊尹學焉而後臣之則湯之不競絿剛柔固自伊尹聖學中來其不震動戁竦亦惟有尹之任故湯得以大進其武功也然則韋顧昆吾與夫夏桀之伐豈湯一人之獨任哉實惟阿衡有以左右之耳已上四章皆頌成湯功烈至此乃以左右商王一語歸之阿衡則湯固為百世不遷之烈祖而商之子孫凡有大享於先王則伊尹以佐命元臣得與於享無疑矣殷武首章自古中興之君未有不以武徳勝者葢繼衰亂之後内之則法度之既弛紀綱之既壞外之則諸侯之既叛四夷之既起自非以武徳勝之則安能舉王綱於已墜合人心於已離撥亂而復反於正哉若殷之髙宗是已方其撻然用武以伐荆楚也罙入其徂則彼雖有山川之險而不足恃也裒荆之旅則彼雖有人民之衆而不足賴也是何也以王者之無敵也於是荆楚之地截然齊一則信乎其無愧於湯之孫矣二章商自盤庚遷殷在河之南去荆楚為近去氐羗為逺故告之曰爾荆楚雖遠亦吾國之南鄉耳昔成湯之世雖逺而氐羗且莫敢不來享謂獻其方物也莫敢不來王謂共其臣職也夫以臣事君以子事父以逺人事中國此天地之常經自先王以來未之有改也故雖逺而氐羗猶不敢以不來則近而荆楚又曷敢以不至哉三章諸侯之立國其始雖本於天命而嵗事之共尤不可不奉乎王命焉觀勿予禍適之辭乃其兢惕戒懼之誠所以奉王命保天命而君國子民之本也葢君國子民之道莫先於稼穡苟農事之不修則國用之不給上無以供朝貢而盡臣職内無以供祭祀而盡闕道故葛伯不祀則亳衆往耕而征伐隨之田野不闢則天子巡狩而責讓加焉必也於稼穡能匪解則朝貢祭祀無不有以供嵗事之常其得免於罪愆冝矣四章天命不外乎民心民之視聴即天之視聴民之好惡即天之好惡則下民之嚴信乎其不可忽矣君人者知所以敬天敬民則於刑賞之際必不敢怠遑而或至於僭濫不僭則賞當功不濫則罰當罪然刑賞見於事者也戒懼存於心者也見於事者雖可以勉彊於其暫然苟戒懼之心不繼則今日之賞雖不僭安知後日之不以私喜而或至於僭乎今日之刑雖不濫安知後日之不以私怒而或至於濫乎故必不敢怠遑之心常流行乎賞善罰惡之間則賞非私賞與衆共之刑非私刑與衆棄之好惡不咈乎民而命討必奉乎天此天之所以命於下國而大建其福也賞不僭如舜之命九官刑不濫如舜之誅四凶高宗之賞不僭於其命多辟見之刑不濫於其伐鬼方見之其不敢怠遑又於書之不敢荒寧見之噫此所以受命而中興也歟詩解頤卷四
