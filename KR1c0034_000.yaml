body:
  text: 詩解頥詩類提要臣等謹案詩解頥四卷明朱善撰善字備萬號一齋豐城人洪武中官至文淵閣大學士事迹附明史劉三吾傳是編不載經文但以詩之篇題標目大抵推衍朱子集傳為說亦有闕而不說者則併其篇目畧之其説不甚訓詁字句惟意主借詩以立訓故反覆發明務在闡興觀羣怨之㫖温柔敦厚之意而於興衰治亂尤推求源本剴切著明在經解中為别體而寔較諸儒之争競異同者為有禆於人事其論何彼襛矣為後人誤編於召南葢沿王柏之謬說不足為據其論二子乘舟謂夀可謂之悌弟伋不可謂之孝子律以大杖則逃之文固責備賢者之意實則申生自縊春秋無貶尚論古人亦未可若是苛也然論其大㫖要歸醇正不失為儒者之言其於太王翦商一條引金履祥之言補集傳所未備其據宣王在位四十六年謂節彼南山之申伯蹶父皇父尹氏皆非當日之舊人駁項安世之説亦時有考據明史載其引據往史駁律禁姑舅兩姨為婚之説極為典核知其研思典籍具有發明葢元儒篤實之風明初猶有存焉非後来空談髙論者比也乾隆四十六年十月恭校上總纂官臣紀旳臣陸錫熊臣孫士毅總校官臣陸費墀
