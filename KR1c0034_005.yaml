body:
  text: 詩解頤跋詩經解頤一編先師文淵閣大學士一齋朱先生之所述也先生得家學之傳經籍無不考頤至古詩三百篇尤博極其趣每授諸弟子于發明肯綮處輒録之時愚亦在門不數年成集俾誦之者不待玩諸心而喜形于色先生遂取匡説詩解人頤之語以名之其子叔既鋟諸梓逺邇讀詩之士往往稱之不啻良金美玉之重焉比年愚承乏南昌司訓上下亦莫不重是編之便學者但嵗久不能無亥豕魯魚之難辨于是僉議命工重刋以廣其傳愚僭分章析類正其訛誤以便觀覽亦未必無小補云洪武三十五年嵗在壬午孟夏上瀚後學豐城丁隆謹識
