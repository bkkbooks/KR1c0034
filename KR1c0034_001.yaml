body:
  text: 詩解頤卷一明朱善撰國風一周南總論周天子之國南南方諸侯之國也謂之周南者修齊治平之道本之乎天子達之乎諸侯表立于此而天下無不知所取正焉法立于此而天下無不知所取則焉此化之所以行而俗之所以美也由關雎而螽斯其詩作於宫中此身修家齊之效也桃夭罝芣苡其詩作于國中此家齊國治之效也漢廣汝墳其詩作于南國此國治天下平之漸也若麟趾則又王者之瑞也故以是終焉是時王道明盛國不得異政家不得殊俗故以南之一字該之則南方諸侯之風皆可得而見矣關雎淑者善也是女德之至著者也凡溫恭慈惠端莊靜一悉舉之矣文王聖人也而詠其德者一言以蔽之不過曰敬而已大姒聖女也而詠其德者一言以蔽之不過曰淑而已蓋能敬則能靜存動察而無一時之或怠無一事之或忽其自強不息以此其純亦不已亦以此此所以為乾之健也能淑則能事上接下而無一事之或愆無一理之或遺其配至尊也以此其奉宗廟也亦以此此所以為坤之順也故曰窈窕淑女君子好逑言能體坤道之順以承乾也葛覃首章黃鳥飛鳴乃春暮初夏之時葛方長而未盛未可刈也而已動女工之思見其念念不忘也二章刈而後濩濩而後績績而後成布成布而後為衣其為之也有序其服之也不厭此所以為勤且儉也三章師氏導我者也則必每事而詢訪見其不敢專也父母生我者也則必及時而問安見其不敢忘也君子宗主我者也則必因師以致告見其不敢褻也總論此詩三章首章是未為絺綌以前事二章是正為絺綌時事三章是既為絺綌以後事所謂勤儉孝敬亦非后妃之自言也乃讀詩者即為絺為綌之辭而知其能勤即浣濯無斁之辭而知其能儉因其告師氏而知其能敬因其歸寧父母而知其能孝前關雎之所謂淑指其德之全體言也此所謂勤儉孝敬又各就其一事言之也所謂后妃之本者勤儉孝敬正修身之事身固家國天下之本也卷耳卷耳易得之物頃筐易盈之器其采之非必難且勞也然采之又采而不盈頃筐何也則以其心在乎君子而不在乎物也于是舍之而置彼大路之旁焉其心之專一而不暇于他可知也總論此詩見后妃之于君子思之切憂之深望之至然有懇惻至到之意而無悲愁悽愴之懷蓋所以憂思者情也雖憂而不至于傷雖思而不至于悲者后妃之所以性其情也噫此所以為不可及也樛木螽斯樛木美后妃不妬忌而衆妾有祝願之誠螽斯美后妃不妬忌而子孫有衆多之盛蓋正家之道始于閨門尊卑之分雖不可以不嚴而必均其施于房帷之間貴賤之位雖不可以不定而必霈其澤于衽席之際故上無嫉妬之心則下無怨恨之意和氣充溢瑞慶流衍福履之綏子孫之衆自有不期然而然者矣噫此文王大姒之德所以為盛而有周八百年之業所以必自此而基之也歟桃夭宜者和順之意和則不乖順則無逆此非勉強所能致也必孝不衰于舅姑敬不違于夫子慈不遺於卑幼義不咈于夫之兄弟而後可以謂之宜是豈易而能哉之子之所謂宜猶后妃之所謂淑然淑以其德之藴于中者言宜以其效之著于外者言惟其有是德故可必其有是效也后妃躬行而倡于上之子則效而應于下故于歸之際見者知其必有以宜室宜家焉此亦可以觀感應之機矣免罝罝兔即武夫之事武夫即罝兔之人肅肅以言其敬赳赳以言其勇曰干城以其才之著于外者言也曰好仇曰腹心則以其德之藴于中者言也以武夫之賤而才可以為千城德可以為好仇為腹心是何人才之盛若此哉蓋幸而遇聖人之世又幸而生聖人之國則其親炙聖人之化固宜其成就之若此也棫朴之詠文王曰豈弟君子遐不作人旱麓之詠文王曰周王夀考遐不作人是人才之作興固本之文王之德尤本之文王之夀也有文王之德故其造就之也速有文王之夀故其涵養之也深雖以罝兔之野人而嶷然可以為公侯之良輔則其在官使者從可知矣漢廣漢之廣者不可泳江之永者不可方以比女德之端莊靜一者不可求也言今日之不可求則知前日之可求矣前日之可求衰世之俗也今日之不可求聖人之化也夫觀聖人之化不於其他而必於江漢之遊女何也曰天下之治正家為先録一漢廣以見天下之家正也天下之家正而天下治矣非聖人之化而能若是哉汝墳周南十一篇而南國之詩僅居其二何也曰漢廣汝墳之間是非一國也而其被聖人之化則一而已矣不録則無以見其風俗之善盡録則又有不勝其可録者焉故録一漢廣以見其德之端莊其性之靜一者非特一遊女而已也録一汝墳以見其意之忠厚其志之專慤者又非特一行役之婦人而已也是時王化自北而南故觀于桃夭而見化之行于國中者如此觀于漢廣汝墳而見化之行于南國者又如此詩亦何以多為哉麟趾麟性仁厚故其趾亦仁厚然非獨其趾之仁厚而己有額焉可抵而不以抵則其額亦仁厚也有角焉可觸而不以觸則其角亦仁厚也此見物性之仁者其體雖不一而固無一體之不仁也文王后妃仁厚故其子亦仁厚然非獨其子之仁厚而己有公姓焉其被化而仁厚無以異于公子也有公族焉其被化而仁厚無以異于公姓也此見聖德之仁者其人雖不一而固無一人之不仁也詩人言之不足而重嗟歎之首章之于嗟所以歎公子之即麟也二章之于嗟所以歎公姓之即麟也三章之于嗟又以歎公族之即麟也始焉即物以興乎人終焉因人而擬諸物其所感者深矣二南總論讀聖賢之書必自大學始誦三百篇之詩必自二南始二南之與大學實相表裏蓋大學是言修齊治平之理二南是言聖人修齊治平之事大學是聖人立法以教人如射之必至于彀大匠必用夫規矩二南是聖人躬行心得于上而化行俗美于下乃羿之發而必中大匠之巧用規矩以成其室屋者也然則讀大學者固不可不知二南而學二南者又豈可徒誦其文而不考聖人行事之實哉召南鵲巢周南之與召南合而言之則周南猶易之有乾召南猶易之有坤分而言之則國君能正心修身以刑其家是亦一乾道也夫人能專靜純一以配其君是亦一坤道也推而至于大夫妻亦然凡為夫者皆屬乎乾道凡為妻者皆屬乎坤道蓋陽健而隂順陽唱而隂和陽主其始隂成其終此天地之常經其理則通上下而無間其道則亘古令而不易能盡斯道者夫愛其內助婦愛其刑家交相愛而家道成矣然則周南之始關雎召南之始鵲巢讀詩者其可易而觀之哉采蘩蘋蘩蕰藻之薦者夫人之職夙夜將事之敬者夫人之心國君之于夫人固曰將以共承宗廟之重也苟不能以誠敬之心奉祭祀之事則何以配君子而為宗廟主哉采之于沼沚之中用之于宗廟之內舉一事之始終而見其無不敬也竦敬于未祭之先舒遲于既去之後舉全體之始終而見其無不敬也知關雎葛覃為天下風化之首則知鵲巢采蘩亦一國風化之首其謂之坤承乾以此草蟲卷耳后妃之思其君子也草蟲大夫妻之思其君子也曰汝墳曰殷其靁又行役者之妻之思其君子尊卑之分雖殊而室家之情則一于以見地有逺近心無逺近時有古今心無古今正風之所以為正者以行役之有時故雖有别離之思而無怨恨之情也變風之所以為變者以行役之無期故既有别離之苦而又有怨恨之懷也為人上者必有潔矩之恕則能以己之心度人之心征役不至于繁興而人遂室家之樂矣采蘋采之而後盛之盛之而後湘之既足以見其循序采之有其處盛之有其物湘之有其器復足以見其有常蓋由其嚴敬之存乎中是以整飭之著于外嚴敬以心言整飭以事言心之嚴敬者所以為整飭之本事之整飭者所以為嚴敬之驗也奠之必于宗室之牖下則見其事之益嚴也主之必以有齊之季女則見其人之能敬也質之美自季女言之也化之逺本聖人言之也甘棠敬其師者視其書册而不敢越愛其親者視其杯棬而不能舉召伯之于南國有師保之尊有父母之親民之思之固未嘗一日忘也其人雖不可得而見其德猶可得而想則其迹之所寓有若甘棠者焉其人豈忍輕棄之哉始而曰勿翦謂不可翦其枝葉也曰勿伐謂不可伐其條幹也繼而曰勿敗則非特勿伐而已雖敗折之且有所不可也終而曰勿拜則非特勿敗而已雖拜屈之且有所不可也所以然者以召伯嘗于此乎茇于此乎憩且説也其愛之愈久而愈深如此讀是詩者可以見文王之風化逺矣召伯之政教深矣南國之風俗厚矣噫是豈後世所能及哉行露貞信之女此能遵召伯之教服文王之化者也強暴之男此不遵召伯之教不服文王之化者也豈文王召伯之教化能行於貞信之女而不能行于強暴之男邪蓋當是時南國之人染商之惡俗方深被周之善政猶淺則其或變或不變固不可以一律齊也譬之陽氣之復一陽之微雖不足以勝五隂之盛然其氣之上騰已駸駸乎不可遏矣積而至於薰蒸透徹則陽盛隂微而為夬為乾自有不期然而然者矣桃夭之宜室宜家純乎純者也漢廣之遊女歎其終不可求此被化而先變者也行露之貞女見訟而召致於獄此被化而未純者也斯女也蓋幸而遇聖人之世不幸而逺聖人之居也太陽雖無私而其照隂崕也獨後陽春雖無私而其至隂谷也獨遲其勢則然也殷其靁何斯違斯念其久也莫敢或遑閔其勞也振振君子美其德也歸哉歸哉望其至也往後者君子事上之義思念者婦人愛夫之情二者固並行而不相悖也總論二南言振振者凡三螽斯之振振以衆盛言也麟趾之振振以仁厚言也殷其靁之振振以信厚言也自子孫之衆多而言故取其盛自聖化之漸濡而言故取其仁自室家之别離而言故取其信言固各有所指也摽有梅始而逮吉猶有待也繼而逮今則已迫矣終而謂之則愈迫矣是蓋汲汲于求售者而豈可以貞信許之邪嘗試思之男有家女有室必有待乎父母之命今而曰求我庶士則是苟有求之者將不待父母之命而輕以其身許人也豈有當聖人之世輕以其身自許于人而可以為貞乎意斯女也必不幸而父母俱亡內之無兄弟之可依外之無婚姻之可托其勢孤其援寡處于昏亂之俗惴惴乎惟恐其身之不保故其形于言者如此其亦可念也已若是則亦聖人之所許也江有汜始而不我以者私欲之害乎良心也終而遂能悔者天理之勝乎私欲也自一人之身言之則可以見其私欲消而天理復自天下之勢言之又可以驗夫聖化行而美俗成使其終迷而不悔則是詩也且為抆淚謳吟之作而風遂變矣寒谷之無溫覆盆之不照雖非造化之罪亦豈不足為造化之纍哉故一人之悔不悔其事為甚微而可以驗王化之行不行則所繫為甚大聖人録之蓋亦幸其悔悟之蚤而王者之化得以周遍而無礙也何彼穠矣何彼穠矣之詩或以為武王之後或以為平王襄公之事然以詩之例考之二南之詩皆述文王大姒之化是時文王未嘗稱王故其詩不謂之雅而謂之風兔罝所謂公侯正指文王言也公稱公侯則子自應稱公子女自應稱伯姬叔姬必不稱王姬也此詩若以為武王以後之詩則當屬之小雅固不可以入召南若以為平王襄公之事則作于王國乎當屬之王風作于齊國乎當屬之齊風尤不可以入召南也今而列于召南則豈特非周公之舊固亦非夫子之舊其為後人誤入無疑騶虞于嗟騶虞之辭與于嗟麟兮無以異而彼以為興此以為賦者于嗟麟兮此興中之比也于嗟騶虞此賦中之比也公子之仁無以異于麟趾所以見家道之盛諸侯之仁無以異于騶虞所以見王道之成由是而法度彰由是而禮樂著由是而雅頌之聲作豈徒曰風而已哉總論南方之諸侯固非一國也而國君之夫人無不有鵲巢之德大夫之妻無不有采蘋之敬立乎朝廷者無不節儉而正直處乎閨門者無不専靜而純一為嫡妻者無不有逮下之仁為媵妾者無不有安分之義雖里巷僻逺之處民庶微賤之家而其女子之賢猶以貞信而自守無強暴之相陵則推而上之從可知也積而至于仁如騶虞則王道成矣先儒所謂舉一世而言固無一人之不仁舉一人而言又無一事之不仁者惟此時為然是雖文王意誠心正之功而召伯循行宣布之力亦不可誣也然則後之人君如欲復三代之治者其可不取法于此哉邶柏舟首章莊薑之憂何憂也憂己之不得于其夫也己之不得于夫似若未害也而夫婦之道于此乎始虧嫡妻之分于此乎始亂廢嫡立庶之禍又將于此乎始萌思昔先王之世關雎之和樂樛木之不妬忌小星之安分而無怨此何時也而今也乃使我以其柔順之質淑善之心處人倫之變而不得以道其常涕泣以言之劈摽以風之而先王之正風顧自我而始變則是綱常之既隳名分之既紊典法之既廢事始于閨門而毒流于一國怨生于袵席而禍延于後世斯憂也豈惟一人之憂乃邦國無窮之憂也而亦何能自已于言乎夫子録之且列于變風之首固將以垂戒天下後世也四章此詩首章但言隱憂而不言所憂者何事蓋婉辭以發端也至于四章乃言愠于羣小則莊薑之所憂者不過憂妾之亂嫡而已是以憂之之深而寤辟有摽則固非飲酒之所能消也憂之之久而不能奮飛則固非敖遊之所能解也此二憂字蓋終首章隱憂之意也總論莊薑不得志於夫而無怨夫之意不見禮於兄弟而無絶兄弟之情不見愛于衆妾而無怨衆妾之心所以自反者惟知心志之不可以不專一威儀之不可以不間習使惡我者無得而簡擇怒我者無得而瑕疵其亦可謂善自處矣噫此所以居變風之首也歟緑衣前之憂憂今日遇此而無聊也後之思思古人處此之有道也然古人之處此亦豈有他道哉亦曰安于義命而已矣燕燕塞實淵深以德之藴于中者言溫和惠順以德之著於外者言藴於中者所以為淑慎其身之本著于外者所以為淑慎其身之驗戴媯之德如此可謂賢矣余讀是詩未嘗不歎莊公之狂惑也使其翻然悔悟立莊薑以為之主俾戴媯以為之助則閨門正矣立子完以為之嫡命石碏以為之輔則國本定矣若州吁者可教則姑教之不可教則去之夫如是則衛非今日之衛即康叔武公之衛矣顧乃以寵奪正以孽奪宗卒貽國家無窮之禍不謂之狂惑而何乎終風變風之始于莊薑何也曰婦人夫其所天也而以夫則狂惑妾其所使也而以妾則上僭子其所恃賴以終身也而以子則暴而無禮莊薑之處此亦難矣然有夫之狂惑而能不失其正有妾之上僭而能不失其仁有子之狂暴無禮而能不失其慈雖遭人倫之變而不失乎天理之常則莊薑亦賢矣哉是可以為處變者之法矣擊鼓首章役土功於國者此民也築城于漕者亦此民也南行而平陳與宋者又此民也先王之於民也不得已而用之則必先其所急後其所緩未聞衆役並興罷民之力以逞吾之志若斯之甚者也是亦可謂忍矣大抵好兵者州吁之本心虐民者州吁之素志此詩所謂踊躍用兵即其阻兵之實土國城漕而又南行則又其安忍之驗也阻兵則無衆安忍則無親衆叛親離其卒至于敗亡也宜哉卒章從軍之士以州吁負不義之名于天下知其必有敗亡之禍也故危之若曰此行也將以平陳也然使陳之君臣果有明大義者焉則我必敗亡于陳矣將以平宋也然使宋之君臣果有明大義者焉則吾又將死亡于宋矣自傷不幸而遇此不得與其室家遂前日之約故危之危其身即所以危孫子仲危孫子仲即所以危州吁也卒之討賊之舉不見于他國而見於陳則亂賊之不容于天下豈特君子知之雖軍士亦未嘗不知之也噫孰謂天理民彝之在人心果終可得而泯哉凱風母之于子其乳哺之恩抱負之勤必三年而後免而具長育教誨之功不與焉七其三年則為二十一年矣以二十一年乳哺之勞抱負之苦而又俟其成立則顔色之榮華者亦已悴矣氣力之壯盛者亦已衰矣此正母老受養之時人子報恩之日也而乃或不安其室焉雖曰母以淫風流行之故無亦七子之事其親果有未盡善者乎使七子之中果無一人之不盡善則必能先意承志諭父母于道而非僻之心無自萌矣既不能先意承志以消弭其過于未萌及其過之已形也乃悔悟而自責吁已晚矣君子取之亦以其猶賢于冥然悍然全不悔悟而不能自責者云爾而或者乃引大舜負罪引慝之事以明之噫舜有不可事之親而乃能使之變惡以為善七子之親非必不可事也而不能潛消默止其過于冥冥之中是豈可與大舜同日語哉為人子者必知此義而後可與言事親矣雄雉雄雉四章前三章皆所謂發乎情後一章乃所謂止乎禮義蓋閨門之內以愛為主則雖思之之切是亦情之正也惟其思之也切故其憂之也深惟其憂之也深故其勉之也至何憂乎爾也誠以軍士之行役也蒙犯霜露更厯寒暑什伍相聮患難同之飢不能以獨飽勞不能以獨逸而又徒侣之中善惡之相雜強弱之相半苟非善處其能自免于患乎忮者嫉人之有求者恥已之無皆取禍之道也必能不忮害不貪求則徒侣之中強者服焉弱者安焉乃可以自勉于患矣噫不忮不求此孔門克已之術求仁之方而行役之婦人能言之其亦可謂賢也已此其所以為先王之遺澤也歟匏有苦葉首章行者之涉水必度乎水勢之深淺而厲揭之男女之昏姻必審乎事理之可否而從違之彼不度可否而率意妄行者未有不階于惡者也二章禮有節文義有裁制禮其體也義其用也棄禮則必至於妄作違義則必至于妄求此淫亂之人所以逆理犯分而不顧也谷風首章隂陽和而雨澤降天道之自然也夫婦和而家道成人道之當然也不以根之惡而棄其莖之美審于擇物者當如是也不以色之衰而棄其德之善審于明人倫者當如是也卒章谷風雖棄婦所作而觀其自序有治家之勤有睦鄰之善有安貧之志有周急之義皆其節之可取者也至于見棄矣而拳拳忠厚之意猶藹然溢于言辭之表則是初無可棄之罪也徒以其夫之安于新昏不以為潔而棄之耳然其言之有序而不迫如此殆庶幾乎夫子所謂可以怨者矣旄丘衛不能修方伯連率之職是誠可罪也雖然方伯連率之職亦豈衛國君臣所能修哉衛固北州大國然而地濵大河其人氣輕浮則非能任重者也其人質柔弱則非能強毅者也其人心怠惰委靡則非能自振拔奮厲者也故自康叔武公而下求其能自保足矣而又何敢望其救人且夫小國不自強于政治而欲恃大國之安靖已則雖以江黃之恃齊桓猶不免于滅亡而况不能為齊桓之舉者乎黎之君臣亦可謂不知所擇矣紀侯恃魯而魯卒不能以存紀黎侯恃衛而衛卒不能以救黎人之不可恃如此有國有家者其亦自強于政治而無恃人以為安也哉簡兮簡兮簡兮言其志之大也有力如虎言其才之武也執轡如組言其藝之精也赫如渥赭言其貌之充也皆自譽之詞也而不免仕于伶官則亦可辱之甚矣使遇西周之盛王豈使我有是哉所以使我至是者正以盛王不可得而見也盛王既不可得而見則賤役亦不可得而辭于是而執籥于是而秉翟于是而錫爵于公庭玩其辭則歡然以為榮揣其意則歉然以為辱故曰彼美人兮西方之人兮安得言從之遊以寫我心之憂乎此其思也深矣其意也逺矣而世莫之知也噫此輕玩之心所由生也歟泉水禮緣人情而為之也夫既曰緣人情而為之則父母其本根也兄弟其同氣也皆人情之不可忘者而曷為其不可以寧兄弟也曰人之情有出于天理之公者有出于人欲之私者聖人制禮將以全夫天理之正而節其人欲之流也據禮女子已嫁而反兄弟不與同席而坐不與同器而食所以厚别也則閨門之內所可同坐而共食者惟母姑姊妹耳使父母沒而歸寧則誰與同坐誰與共食而孰為之主乎聖人于此寧以義斷恩不以恩掩義故制為父母終不得歸寧之禮所以存天理而遏人欲也以此為防猶有禽獸其行如齊襄魯桓夫人之所為者然後知聖人制禮真可謂萬世無弊者矣北門投之以王事之重遺之以國事之難益之以家計之窘賢者之處此亦難而又家人之交謫則是內不見知於妻子也祿食不足以自存則是外不見知于君上也斯二者人之所為乎抑天之所為乎然不得于天而不怨天不合于人而不尤人盡心竭力以為其所當為而無一毫忿悶之心此所以為賢也二子乘舟宣公納子之妻以為妻則夫婦之倫滅矣因宣薑而殺二子則父子之倫滅矣夫而不夫父而不父則君人之道不立而君臣之倫廢矣入春秋以來三綱淪九法斁未有甚于此時者也其卒胥而為夷也宜哉總論或曰夀伋之爭死可以為孝乎曰吾嘗聞孝于夫子矣其責曾子蓋曰舜之於瞽瞍小杖則受大杖則走今宣公逆理亂倫欲殺其子而為子者又成父之志以陷父於惡使陷父于惡而可以為孝則是教天下後世之為人子者皆從父之志以成國家無窮之禍也而可乎抑夀之死又與伋異彼誠不忍其兄之無罪而見殺而以父母之情告之冀兄之或聽而逃焉以避難使伋能逃則夀固不死也惟伋之不能逃也故不忍獨存而竊其節以先往冀其兄之徼幸于萬一其志亦可傷矣是則二子之死一也而伋之志在于從其父夀之志在于讓其兄讓其兄者不害其為恭而從其父者固未可遽以為孝也鄘柏舟女子之生以身事人一與之齊終身不改古之制也共薑之守義裁以古制亦婦道之當然耳而讀詩至此使人欣然每若景星鳳皇之為瑞何也蓋衛詩三十九篇前乎此者為靜女為新臺後乎此者為牆有茨為君子偕老人道至此而盡天理至此而滅矣聖人于其間而置柏舟焉又以見人心之未嘗亡天理之未嘗滅也則讀是詩者又安得不瞿然而驚躍然而喜而歎斯人之不多見乎噫不有疾風無以知徑草之後衰不有洪流無以知底柱之屹立聽桑間濮上之餘音而歌柏舟以洗之亦豈不足以挽風俗之衰而扶綱常之重則其置之鄘風之首亦宜矣牆有茨宣薑本伋之妻也一失身于宣公而為新臺之有泚再失身于公子頑而為中冓之不可道蓋由其節義虧缺於前是以無所顧藉于後甘以其身處于汙穢而不辭則亦無復羞愧悔悟之萌矣君子偕老當其奉宗廟之時其首飾之有副也其身章之有翟也是非不盛也而不知宣薑之行果能視先君而無愧否乎當其見賔客之時其禮服之有展也其裏服之有絺也又非不盛也而不知宣薑之行果能視賔客而無愧否乎夫入而奉宗廟出而見賔客非不尊且嚴也而有靦面目曾無羞愧悔悟之萌則是人心之果亡而天理之果滅矣能無滅亡之禍乎定之方中首章遷國之初城郭不可以不完宫室不可以不修器用不可以不備文公之遷楚丘也以言其城郭則既賴諸侯之師以成之矣以言其宫室則自戴公野處而至于今其成之固不可以不亟也而文公不然為民力之不可以或傷則寧待其時而不速為國法之不可以或廢則寧從其制而不苟此非其心之塞實淵深者固不足以知此若乃器用之所資則或用之于宗廟或用之於朝廷或用之于閨門之內其所給者非一處其所需者非一事我乃于是而種木焉原文公之意豈不以創造之初固當先其急而後其緩求其略而不必責其詳則夫潤色之功正有待于十年之後今日自我而種之安知他日不自我而用之邪榛栗之種為其可以供籩實也若夫椅桐梓漆四者則材之至美者也其用至廣又豈特可以為琴瑟而已哉凡若此者非其心之塞實淵深尤不足以致此噫若文公者其亦可謂賢矣二章望者登髙而望形勢也景者測景以正方面也觀者觀之以察其土宜也卜者問焉以決其吉凶也始之以望景觀卜所以求得乎善也繼而終焉允臧則是果獲乎善也三章星言夙駕所以見其勤也騋牝三千所以見其富也然所以有是勤者固此心之誠實淵深者為之也所以有是富者又此心之誠實淵深者致之也夫人之秉心苟能誠實淵深則欲霸而霸欲王而王果何所為而不成而豈止于牧養之蕃而已哉蝃蝀昏姻之際男女之大欲存焉待父母之命媒妁之言知正命者也鑽穴隙相窺踰牆相從不知正命者也莊薑之貞靜自守共薑之節義自持可謂知正命也已宣薑一失身而為新臺之有泚再失身而為中冓之不可讀可謂不知正命也已所貴乎知命者謂能全其天理之正以節夫人欲之流也人人能節夫人欲之流則淫亂之風息矣干旄大夫之乘車馬建旌旄而來者乃朝夕與君圖議國政者也彼其承破滅之餘方將撥亂以為治轉危以為安此其弛張闔闢之機固非一人之私智所能獨運也聞浚之郊有賢人焉駕言適野而往從之使其可出邪吾當與之共事也如其不可出邪夫獨無以教我乎國人見其樂善之誠如此故美之曰彼其所見之賢者將何以畀之乎夫賢者以其所學而告之大夫大夫以其所聞入而告之君君復以其所聞而謀之卿大夫而施之政事則豈惟一人賴之將舉國之人實賴之矣味其辭氣蓋與星言夙駕之意相類亦與敬教勸學授方任能之意相表裏序以為文公時詩亦豈無所本歟載馳始之欲往發乎情也終于不敢往止乎禮義也宗國顛覆而不知恤有人心者宜不若是恝也然而義有重于亡者獨且奈之何哉余讀控于大邦而知此詩所由作蓋傷夫人之志也夫控于大邦此男子之事也非婦人之所得為也女子止於禮義而不得為男子者又或溺於欲而不能為自古敗國之君亡家之子卒于委靡而不振者常以此也使許之大夫聞大夫之義能為之請於天王告于方伯率與國以定其難則是使衛國既亡而復存既危而復安豈不足以大慰夫人之心也邪惜也許之君臣不足以及此其後齊卒救衛而封之蓋桓公管仲自為圖霸之舉而非臣子控告之力也總論邶風始于柏舟莊薑處夫婦之變者也鄘風始于柏舟共薑處母子之變者也衛風始于淇奧又以著武公之德也二薑處人倫之變而能不失其常武公處昏亂之世而能獨明厥德使衛之人君皆能有武公之德為夫人者皆能有二柏舟之賢則新臺牆有茨之詩可以不作而衛亦可以無滅亡之禍矣然則聖人刪録之際得無意乎衛淇奧淇奧首章之旨大學章句與或問盡之蓋切磋琢磨者知與行之並進也瑟僴赫喧者表與裏之相符也知行之並進則善其始者固所以成厥終也表裏之相符則充乎內者固所以形諸外也兩言有斐君子美其德之實有以著于已也終言不可諼兮美其成德之效有以驗于人也總論首章以竹之美盛興其德之進修卒章以竹之至盛興其德之成就故讀詩者又當合二章而並觀之所以能有是鍛鍊之精純者由其知行之並進也所以能全其生質之溫潤者由其表裏之相符也寬廣者矜莊之反矜莊而又寬廣則是寬而有制也和易者威嚴之反威嚴而又和易則是嚴而能泰也此所以為德之成也果能是則其謂之睿聖也亦可以無愧矣考槃賢者隱處于澗谷其蓬華之居非若廣厦之安也其藜藿之茹非若肉食之腴也其草衣葛屨非若安車駟馬之寵也而曷為其可樂也蓋其所養之充所守之正有以自尊而不慕乎人爵之貴有以自重而不徇乎外物之誘榮辱不關于心毁譽不加於意則天下之樂亦孰有加於此哉獨寐而寤獨寤而言言已而載歌歌竟而復宿見其無往而不獨亦無往而不樂也是故始而曰勿諼謂其心之不忘乎此也繼而曰弗過謂所願之不踰乎此也終而曰弗告謂不以此樂告人非不以告人也得於心而難於言雖言人亦未必信也斯人也其東漢徐稚之流也歟碩人夫貴族人之所願娶今有是族類之貴而不見答何也美色人之所願得今有是容貌之美而不見親何也大國人之所願交今有是媵送之盛而不見禮又何也蓋莊公狂惑之人也嬖幸之是昵而貞信之是棄今莊薑以其族類之貴容貌之美媵送之盛而端莊靜一以自守則固不能如嬖妾之左右逢迎以求媚説也其不合也宜哉氓責之以良媒是欲謀之人也而不知人之不吾與也要之以卜筮是欲詢之神也而不知神之不吾告也及其見棄而歸兄弟是欲依其親也而不知親之醜吾行而不見恤也亦將如之何哉女之苟合者色衰而愛弛士之苟合者利盡而交絶合之不可以苟也如此彼淫婦之見棄不足恤矣而士君子之立身其可不知所以自重也哉竹竿竹竿衛之物也淇水泉源衛之水也思昔幼時固嘗於此乎釣於此乎笑語且於此乎遊戲矣今而嫁於異國父母既終則雖欲暫焉之往釣不可得也復欲暫焉之笑語遊嬉於其間愈不可得也顧彼二水之流於衛日夜不息而我之阻隔曾二水之不如則其思之將何時而已邪不能不思者情也思之雖切而卒不往者義也人孰無父母也亦孰無兄弟也而女子有行乃獨逺其父母兄弟焉忘宗國而不思非仁也縱情欲而忘反非義也惟既有思國之仁而又能自克以禮自守以義二者並行而不相悖焉此所以為賢也河廣母出固與廟絶而母之與子則初無絶道也為襄公者當若之何曰宗廟之中不以恩掩義閨門之內不以義勝恩襄公能盡其誠敬于宗廟則外既不失乎承重之義盡其孝養於慈母則內亦不失乎愛親之仁庶乎恩義兩全而無恨矣然則母可以返國乎曰母之轍雖不可以私返而子之使則未嘗不可以私往也嵗時問安之使交錯于道路而一草一木之微必先以奉乎親焉則子之心固可以無愧而母之心亦可以自慰矣伯兮首如飛蓬則髮已亂矣而未至于痛也甘心首疾則頭已痛矣而心則無恙也至于使我心痗則心又病矣其憂思之苦亦已甚矣所以然者以其君子之未歸也然思之雖切而無雄雉卒章之勉以正何也觀首章言邦之桀兮則其夫之才必有大過人者豈其于事上保身之道有不待勉而後能故不及言歟王黍離彼宗廟之墟則既有黍矣彼宫室之墟則復有稷矣兩言彼者見地非一處而莫不盡為禾黍也是以使我行之靡靡則足欲前而不忍也心之搖搖則心若懸而靡定也謂我心憂者知我者也而亦非能有以解我憂也謂我何求者不知我者也則亦奚責于彼哉悠悠蒼天歎其逺而莫可詰也彼何人哉歎其罪之不容誅也雖不斥其人而所以追恨之意深矣總論宫室所以奉至尊宗廟所以妥先王而今乃鞠為禾黍徘徊顧瞻安得而不憂追思所以致此者又安得而不怨雖然憂之怨之誠是也憂之怨之而付之無可奈何則非也周之王業公劉開拓之于豳太王創造之于岐文王光大于豐武王成就于鎬皆在西都八百里之內其土地則先王之土地其人民則先王之人民也為子孫者正當以死守之而不去今乃無故舉八百里之舊都棄之而即安于東平王亦可謂不君矣行役之大夫苟無所見則已既已見之而且憂之且追怨之豈容付之無可奈何而已邪謂宜請於平王泣血嘗膽號令諸侯整師緝旅克復舊業諸侯見王之有志孰不奔走而服從當是時晉之羲和鄭之掘突既皆王室舊勳齊藉太公之故基魯承周公之遺烈衛憑康叔之威靈亦皆足以左右王室苟有宣王中興之志則侯國之甲兵即吾之甲兵侯國之財賦即吾之財賦也而王自棄之為之臣者又寂無一人以為言則其偷安忍恥頺墮委靡豈特王之罪亦羣臣之罪噫周轍之不西有由矣夫鄭緇衣緇衣所以為好賢之至者以其始終之如一也始之厚者不能保其終之不薄始之勤者不能保其終之不怠惟緇衣之好賢不然其改造改作既始終之無間而適館授粲復前後之如一衣欲其常新粟欲其常繼儀刑欲其常接乎目議論欲其常接乎耳殷勤繾綣久而不厭所以為好賢之至爾彼夏屋之渠渠者其始非不盛也而終或每食之無餘每食四簋者其始非不隆也而終或每食之不飽此詩人所以歎其權輿之不繼也觀權輿之不繼益信緇衣為好賢之至大叔于田段之為人以射則善以御則良以容止則甚習以材力則甚武如是而甚不仁夫惟不仁所以欲紾兄而奪其位也而國人愛之若此者豈盡出于公哉王教不明人心不古顛倒是非混淆黑白固有不勝其可歎者矣總論段之輕浮淺露如此固不得為善矣然莊公所以處之者果得為盡善乎仁人之于兄弟也亦親愛之而已矣教誨之而已矣使莊公之于叔段果能寵之以髙位與之以大邑富之貴之而無藏怒蓄怨之意既足以盡吾愛弟之誠矣而又使吏治其私邑使彼城郭不得以擅完車乘不得以擅修卒徒不得以擅興則段雖欲為亂惡乎敢夫親之而使其貴愛之而使其富既足以全吾仁使吏治其邑而彼不得以妄為復足以全吾義若是則莊公所以處段者無以異于舜之處象孰得而議之哉今莊公不然始則恣其所為而不問終則操之已蹙而不恕則是其豫之者乃所以奪之也其寵之者乃所以殘之也其不仁已甚矣聖人録二詩于國風既以著叔段之惡而書鄭伯克段于春秋復以甚莊公之罪其亦可以為後世戒矣羔裘舍命不渝則必不徼幸而苟得而于守身之道得矣邦之司直則必不諛恱以求容而于事君之道盡矣既能明哲以保身又能忠直以事上此所以為邦之彥也歟女曰雞鳴雞鳴而興昧旦而往言其時之有常也翺翔而往鳧鴈而歸言其事之有常也弋而取之於外宜而和之於內蓋欲各供其職也酒食以養其身琴瑟以和其志蓋欲同享其樂也來者致其來贈者送其往順以愛之好以親之皆來之之意問以遺之報以答之皆贈之之意又見其重不在物而在乎德也前二章相戒以職分之當為後一章相勉以德業之交修齊雞鳴男女之際人之大欲存焉節欲而循乎天理者賢君之所以治也縱欲而滅夫天理者昏君之所以亂也此詩述賢妃警畏之心如此蓋天理之所以常存而人心之所以不死也其為君子之助不亦多乎甫田田之大者非果不可治也先小而後大可也人之逺者非果不可來也先近而後逺可也天下之理可循序而漸致不可躐等而欲速果循其序則總角之童可以忽然而見其辨是小非不可以為大近非不可以為逺也果欲躐等則厭小務大而大終不可為忽近圖逺而逺終不可至矣亦何益之有哉魏伐檀車之不可以行于川猶舟之不可以行于陸檀木美材宜為車者也坎坎而伐之非不勤且勞也于河干而置之其如無所用何且車非不可用以稼穡也然欲稼穡者必之乎原隰河于固非稼穡之地也非不可用以狩獵也然欲狩獵者必之乎山林河干固非狩獵之處也夫勞其力而無所用未有不悔者也而斯人之心則曰不耕固不可以得禾而吾何取乎禾之三百也言雖不粒食而不悔也不獵固不可以得獸而吾何取乎庭之懸貆也言雖不肉食而不悔也既不徼幸而苟得不沮抑而自悔其厲志如此亦可以為賢矣故詩人述其事而歎之曰彼君子者真可謂不素餐者矣贊美之辭也唐蟋蟀勤者生財之道儉者用財之法聖人教人不越乎勤儉而已夫勞苦者人情之所畏然而不可以不勉也逸樂者人情之所喜然而不可以太過也必也致其勤于三時之久而享其樂于一時之暫則其生財也不匱而用財也有節矣猶恐其或過也又戒之以思其職之所居夫斯民之職不在乎他男子之所當務者稼穡狩獵而已矣女子之所當務者桑麻紡績而已矣誠使男女各盡其職之所當為則廪有餘粟機有餘布老者衣帛食肉少者不飢不寒而于仰事俯育之間可以沛然有餘雖良士之長慮却顧亦不過如此而已矣豈不可以為美俗哉無衣武公之事人情所不與天理所不容王法所必誅而序以為美之失其旨矣且武公惟有無王之心而後動于惡彼其請命于天子之使豈真知有王哉正以人心不附非假王靈則終不能以定晉也夫王不命焉而請之非禮也不聞朝王而請命于其使尤非禮也為僖王者固當正名其罪命方伯連率帥諸侯以討之隳其都而戮其人為晉立君而後反則人紀既壞而復正王綱已弛而復振文武之道復興于東周矣不此之圖顧乃貪于寶玩而爵命行焉其為長惡也大矣夫子不刪其詩者所以著世變之窮而傷周之衰也采苓采苓于首陽之巔非必果無是事也而猶曰無遽以為信則欲其察之詳也曰舍之而無遽以為然則欲其聽之審也能如是則雖誑之以理之所有其計且有所不行況欲昧之以理之所無其計果孰得而行哉小人之為讒譖或積小以成大或飾虛以為實其為害也大矣患人君不能徐察而審聽之耳苟徐察而審聽之則造言者無所遁其情而被讒者亦可以免於禍矣秦總論案成與非子本兄弟也成之族既為犬戎所滅而非子之孫秦仲復敗死于西戎則二戎者固秦世讎也及幽王為西戎犬戎所殺則二戎者又豈非周之世讐歟使平王而有志者則于襄公之封宜策命之曰戎為不道為封豕長蛇以薦食中國爾祖秦仲既被其害矣今又弒我先王是用痛心疾首夙夜不忘今豫命爾侯于西土藩屏王室爾其糾合侯伯統率師徒為豫一人討之苟捷有功則圭瓚之錫土田之賜豫豈汝愛若是則王轍可以不東戎難可以必除而先王之讐亦可以少報矣既不能然乃曰能逐犬戎即有岐豐之地夫岐豐之地興王之地也不惟其土地人民之不可棄抑先王之墳墓在焉宗廟在焉宫室之美官府之富皆在焉如之何其可委之而去也且先王之封國有常制矣八百里之地封方百里者八以開方計之則又不止于是矣而一旦舉而畀之於秦藉曰其地已為犬戎所侵令其自取然秦能取之王獨不能率諸侯以取之乎王而少有越勾踐之志則必不若是恝矣故嘗謂平王之東也忘先王之仇讐而不報棄先王之土地人民而不恤舍先王之宗廟墳墓而不顧隳先王之典章法度而不守卒使興王八百里之地悉歸于秦則秦之代興不待他日而其兆已見于此矣可勝歎哉駟驖駟驖孔阜馬之良也六轡在手御之良也公之媚子從公于狩便嬖使令之多也至于捨拔則獲則又言其射之善也一章言其往而狩二章言其狩而獲三章言其獲而息此皆創見而深喜之之辭也小戎一章言其車之善二章言其馬之良三章言其器之備以如是之兵甲復如是之寇讐此其矜誇之辭也溫則言其德之和易厭厭則言其德之安靜秩秩則言其德之有常以如是之君子而親如是之勞苦此其閔惜之辭也西戎者秦人不共戴天之讐也故復讐討賊之義不特其君知之其卿大夫知之其國人知之雖行役者之婦人亦無不知之而其形于言者如此東周之君臣亦可以少愧矣蒹葭白露為霜言其時之暮也在水一方言其居之逺也迫之以時之暮限之以水之逺所謂伊人果若何而求之將欲使之逆流而上以求之歟則既逺而不可即將欲順流而下以求之歟則雖近而不可至然則斯人也其終不可見乎孔子曰未之思也夫何逺之有亦在乎心誠求之而已所謂伊人雖不知其所指然味其詞有敬慕之意而無褻慢之情則必指賢人之肥遁者惜不知其何人耳舊説以為未能用周禮者非是無衣與子同袍恩愛相結于無事之時也與子同仇患難相恤于有事之日也先王之時居而為比閭族黨之民出而為伍兩軍師之衆其所以使之相保相愛相扶持者要非一日之積矣岐豐之地雖已屬秦然猶有先王之遺民焉故其所以相告語者如此然曰王于興師則非從其君之私也誠欲其君奉王命而為討賊復讐之舉也惜也周既不能以此而令諸侯秦復不能以此而匡王室卒之數傳之後討賊復讐之志既衰貪功謀利之心益勝而其囂然好戰之習非復先王之民真秦之民矣陳衡門衡門之下可以棲遲即考槃在澗之意也泌之洋洋可以樂飢即獨寐寤歌之意也豈其食魚必河之魴則雖簞食瓢飲未嘗不樂也豈其娶妻必齊之薑則雖縞衣茹藘未嘗不可與娛也此皆其無求自足之意也月出月出之詩其悅之也至矣其思之也切矣其憂之也深矣移是心以好賢亦將何求而不獲哉惜也吾未見好德如好色者也株林衛之亂至于牆有茨而極于是有狄入衛之禍陳之亂至于株林而極于是有楚入陳之禍然則狄非能入衛也宣薑實召之也楚非能入陳也夏姬實召之也此所謂女戎也比事以觀可以為淫亂者之戒矣檜素冠三年之喪非終其服之難情稱其服之難也棘以言其哀遽之狀欒欒以言其毁瘠之形則是其衣服之變顔色之哀心志之思慕皆可即是而見之夫惟表裏之相稱本末之兼善所以為賢惜乎今之不及見斯人也則安得而不勞心慱慱乎匪風周道者適周之道也周之盛時其君則文武成康其臣則周召毛畢東諸侯之朝覲聘問與其臣民之往來以供百役者若百川之赴海蓋靡日而不有也而今也征伐之煩會盟之數吾小國僕僕焉奔走以事大國之不暇而適周者寂乎其無聞也則安得不為之怛然而悲傷乎夫惟適周者之寂然也故又重言以結之曰孰有能西歸者乎有則我願慰之以好音所以傷夫今王之不如古而又以重歎夫今人之不知有王也曹鳴鳩首章即其儀之一而知其心之誠二章即其服之盛而知其德之稱三章言由其身之修故化有以行于國四章言由其國之治故福有以裕其身前三章皆頌美之辭末章胡不萬年則祝願之辭也豳七月首章七月之詩以衣食為急而衣食所資以豫備為貴必以七月為首者三隂之月隂氣始盛故于是而豫為禦寒之備三陽之月陽氣始盛故于是而豫為治田之備先衣而後食故以七月為首也大寒之候在于丑月而圖之于建申之時收成之候在于酉月而慮之于建寅之日其為豫備可知若寒至而後索衣飢至而後索食則其為計亦晚矣二章豳民以流火為授衣之漸故于春月將蠶之候蠶之新出者則求稚桑以養之蠶之未出者復求白蒿以洗之此見其趨事之勤也而其許嫁之女豫以將及公子同歸而逺其父母為悲此見其秉心之厚也此所以為邠俗也三章上章于春日而求桑以養蠶為今年授衣計也此章于八月萑葦既成而豫蓄之以為曲薄為明年養蠶計也上章求稚桑以養其始生者采白蒿以洗其未生者此蠶事之始也此章于桑之大者條取之桑之小者猗取之蠶盛而大小畢取此蠶事之成也蠶事既成又于鳴鵙之候而績其麻以為布蓋蠶之所成者可以供老疾給昏嫁奉君上而已非績麻以為布則固無以為少者壯者之供也蠶績皆成然後染之或以為玄或以為黃而其朱者尤為鮮明且以供上而為公子之裳其風俗之厚如此豈一日之積哉四章四月純陽而微隂已萌葽感之而蚤秀五月一隂成象蜩感之而始鳴八月正秋物成而禾之蚤者可穫十月隂氣已極而木之隕者為蘀四者見隂氣以漸而至而將寒之侯也西北地寒非狐貉之厚無以禦之然貉賤而狐貴賤者以自奉貴者以奉公也至于二之日則又竭作以狩纘繼武功而私其一嵗之豵獻其三嵗之豜焉于裘則私其賤而奉其貴于物則私其小而奉其大其薄于已而厚于君如此五章由動股而至于入我牀下所以感時物之屢變由穹窒而至于墐户入室所以盡人事之當為豳民于衣食之奉必先老而後幼先貴而後賤獨于改嵗入室則老幼貴賤同之所以廣其愛也六章此章當看介眉夀食農夫六字鬱薁之食葵菽之烹棗之剝而春酒之為皆介眉夀之事介有助之之意則非以為常食也瓜之食壺之斷苴之叔荼之采而樗之薪皆食農夫之事食有養之之意固以是為常矣然則果酒嘉蔬非不可以及少也而供老疾奉賔祭之意多爪壺苴荼老者未必不食也而不可以為常于以見食稻食肉乃老者之常而果酒嘉蔬則又于常食之外專以此而致其助也有常食以養之而又有美味以助之此豳人之老所以無凍餒也歟七章稼之既同者可以少休也而即念夫邑居之當修屋之方秉者可以少緩也而復念夫農功之當始其于築而納之也有以見歡欣鼓舞之意于其亟而乘之也有以見勸勉戒飭之意事有始終而其憂勤艱難則無間于始終此所以為厚也歟八章鑿冰藏冰其供上役也為甚勤肅霜滌場其畢農功也為甚速故其開冰也獻羔以祭司寒祭韭以薦寢廟君既得以致其誠于神其務間也殺羊以獻于公舉酒而祝其夀民復有以致其忠愛于君可謂上下相親之甚矣鴟梟鴟梟之于衆鳥有攫其子而食之者矣而鳥不以子之既失而遂廢其生育之勤也有毁其巢而破之者矣而鳥不以巢之既毁而遂廢其補葺之勞也蓋子之殘而室之毁者禍患之不測也養育之勤而補葺之勞者已分之當為也豈可以禍患之或至而遂廢其室家嗣續之常理也哉若武庚之敗管蔡則比之於鳥雖取其子猶未能毁其室也而纒綿補葺之勤周公果可以辭其責邪于是拮據于是蓄租于是手口交病卒之羽殺尾敝以成其室而未安也則其作詩以遺王亦不得而不汲汲矣噫當是時王心疑于上羣情惑于下亂賊乘機伺間於其側國勢之危甚于風雨之漂搖非周公至誠果孰能感悟王心解釋羣疑誅討亂賊以措國家于泰山之安磐石之固哉東山聖人之所以能感人者以其以已之心度人之心而下之人亦樂於效力而不患上之不我知也東山之詩述其歸而未至也則凡道塗之逺嵗月之久風雨之凌犯飢渴之困頓裳衣之以久而垢敝室廬之以久而荒廢室家之以久而怨思皆其心之所苦而不敢言者我則有以慰勞之及其歸而既至也則覩天時之和暢聽禽鳥之和鳴而人情和悅適與景會舊有室家者其既歸而相見固可樂未有室家者其既歸而新昏尤可樂此皆其心之所願而不敢言者我則有以發揚之莫苦于歸而在塗之時而上之人能與之同其憂莫喜于歸而相見之時而上之人能與之同其樂樂以天下憂以天下然而不王者未之有也其是之謂歟總論或曰以周公而誅武庚猶以千鈞之重而壓乎鳥卵之上蔑不破矣而奚俟乎三年之久也曰文武深仁厚澤其浸漬于西土者雖深而漸濡于殷邦者猶淺其頑民染于商辛之舊習者未盡變其賢士懷于先王之遺澤者未盡泯一旦改商而為周其眷眷思念之意固未遽釋然也況又益之以管蔡之流言在我者有釁之可乘乎周公之東征也將以誅之邪將以化之邪將以誅之則固不可勝誅將以化之則又非一朝一夕之所能也故衮衣繡裳舒徐容與于東山之下諄諄乎友邦之訓誨懇懇乎讐民之戒飭使人曉然知逆之不可以犯順邪之不可以干正則自然有以剪其羽翼而披其枝葉將不必斧鉞干戚之用而罪人斯得矣卒之三年之久所誅者不過武庚管蔡而已其于殷士殷民不戮一人而天下服則周公之於庶殷非以力勝之也以德化之也惟其以德服人也故軍士之從公而東者雖有别離之苦而無死亡之患則周公此舉可謂仁之至而義之盡矣破斧武王一戎衣而天下定四國既莫不敢一于正矣及管蔡以武庚叛而四國復有不正者焉周公之東征也固將以我之正正彼之不正也而孰能禦之也哉理之逆者不足以犯我之順也辭之曲者不足以抗我之直也氣之餒者不足以敵我之浩然也戮一人而天下服則向之不正者復反于正矣蓋其匡四國即所以哀我人匡四國者以其功言也哀我人者以其心言也惟其心即天地生物之心故其功即天地成物之功也是詩雖作于軍士然亦可謂知聖人者矣九罭鴻飛而戾天宜也而有時乎遵渚復有時而遵陸則亦暫焉而已耳公歸而在朝宜也而于此乎信處于此乎信宿則亦豈久于是哉夫惟其信處信宿于此也是以東方有此服衮衣之人此固東土之幸也然相位不可以久虛君德不可以無輔人心天意不可以久咈則必有迎公以歸者而使我心悲矣蓋留公者東人之私情而迎公者天下之公論一人之私情不足以勝天下之公論此東人所以拳拳於公雖欲挽而留之而卒不可得也狼跋物之纍於形者其進退跋疐無所往而不病聖人之周於德者其進退從容無所往而不宜蓋臨大難而不懼處大變而不憂斷大事而不疑非道隆德盛者固不足以語此非常人之所能及也詩解頤卷一
